<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金牛頓公司行事曆</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background-color: #f8f9fa; margin: 0; }
        
        #calendarContainer { border: 2px solid #00008B; background: white; border-radius: 8px; overflow: hidden; max-width: 1200px; margin: 0 auto; }
        #calendarHeader { background-color: #00008B !important; color: white !important; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background-color: #e3f2fd; padding: 12px; text-align: center; color: #1565c0; }
        td { border: 1px solid #dee2e6; height: 130px; vertical-align: top; padding: 8px; }
        
        /* 關鍵：金牛頓的整格深藍色底 */
        .cell-gold-newton { 
            background-color: #00008B !important; 
            color: #FFFFFF !important; 
        }
        
        td strong { font-size: 1.2em; display: block; margin-bottom: 5px; }
        .leave-record { padding: 4px 8px; margin-top: 4px; font-size: 1.05em; line-height: 1.4; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="calendarContainer">
        <div id="calendarHeader">
            <button onclick="changeMonth(-1)">◀ 上個月</button>
            <span id="currentYearMonth" style="font-weight:bold; font-size: 1.3em;"></span>
            <button onclick="changeMonth(1)">下個月 ▶</button>
        </div>
        <table id="calendar">
            <thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv&t=' + new Date().getTime();
        let leaveRecords = [];
        let currentDisplayDate = new Date();

        async function fetchData() {
            const response = await fetch(CSV_URL);
            const text = await response.text();
            leaveRecords = text.split('\n').slice(1).filter(r => r.trim()).map(r => {
                const [name, type, start, end, dur, note] = r.split(',');
                return { name: name?.trim(), type: type?.trim(), start: start?.trim(), end: end?.trim(), note: note?.trim() };
            });
            renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1);
        }

        function renderCalendar(year, month) {
            document.getElementById('currentYearMonth').textContent = `${year}年 ${month}月`;
            const tbody = document.querySelector('#calendar tbody');
            tbody.innerHTML = '';
            
            let firstDay = new Date(year, month - 1, 1).getDay();
            let lastDate = new Date(year, month, 0).getDate();
            let row = document.createElement('tr');
            
            for(let i=0; i<firstDay; i++) row.appendChild(document.createElement('td'));
            
            for(let d=1; d<=lastDate; d++) {
                if((firstDay + d - 1) % 7 === 0) { tbody.appendChild(row); row = document.createElement('tr'); }
                let cell = document.createElement('td');
                const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                
                // 判斷是否有金牛頓活動
                const isGoldNewton = leaveRecords.some(r => ds >= r.start && ds <= r.end && r.type?.includes('金牛頓'));
                if(isGoldNewton) {
                    cell.classList.add('cell-gold-newton');
                }

                cell.innerHTML = `<strong>${d}</strong>`;
                
                leaveRecords.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                    cell.innerHTML += `<div class="leave-record">${r.name}:${r.note}</div>`;
                });
                row.appendChild(cell);
            }
            tbody.appendChild(row);
        }

        function changeMonth(d) { 
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); 
            renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1); 
        }

        fetchData();
    </script>
</body>
</html>
