<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>金牛頓行事曆</title>
    <style>
        body { font-family: sans-serif; }
        table { width: 100%; border-collapse: collapse; }
        td { border: 1px solid #ccc; height: 100px; vertical-align: top; }
        .type-activity { background-color: #00008B; color: white; } /* 金牛頓深藍 */
    </style>
</head>
<body>
    <table id="calendar">
        <tbody id="calendarBody"></tbody>
    </table>
    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';

        fetch(CSV_URL)
            .then(res => res.text())
            .then(text => {
                const rows = text.split('\n').slice(1);
                const tbody = document.getElementById('calendarBody');
                rows.forEach(row => {
                    const cols = row.split(',');
                    if (cols.length < 2) return;
                    // 這裡確保資料確實被讀取出來
                    console.log("讀取到資料:", cols[0], cols[1]); 
                });
            });
    </script>
</body>
</html>
