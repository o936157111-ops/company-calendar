<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>金牛頓公司活動行事曆</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background-color: #f8f9fa; max-width: 1200px; margin: 0 auto; }
        h2 { color: #0d47a1; border-bottom: 3px solid #e0e0e0; padding-bottom: 5px; }
        .admin-only { display: none; }
        table { width: 100%; border-collapse: collapse; background-color: white; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: center; }
        .leave-record { padding: 3px; font-size: 0.8em; text-align: left; background: #eee; margin-top: 2px; }
    </style>
</head>
<body>

    <h2>📊 金牛頓公司行事曆 (已串接 Google 表格)</h2>
    <div id="calendarContainer">
        <div id="calendarHeader">
            <button onclick="changeMonth(-1)">◀ 上個月</button>
            <span id="currentYearMonth"></span>
            <button onclick="changeMonth(1)">下個月 ▶</button>
        </div>
        <table id="calendar"><thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead><tbody></tbody></table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        let leaveRecords = [];
        let currentDisplayDate = new Date();

        // 核心：從 Google 表格抓取資料並同步
        async function syncDataFromGoogle() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').slice(1); // 跳過標題
                leaveRecords = rows.filter(row => row.trim() !== "").map(row => {
                    const [name, type, start, end, dur, note] = row.split(',');
                    return { 
                        name: name?.trim(), 
                        type: type?.trim(), 
                        start: start?.trim(), 
                        end: end?.trim(), 
                        note: note?.trim() 
                    };
                });
                renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1);
            } catch (e) { console.error("資料同步失敗", e); }
        }

        function renderCalendar(year, month) {
            document.getElementById('currentYearMonth').textContent = `${year}年 ${month}月`;
            const tbody = document.querySelector('#calendar tbody');
            tbody.innerHTML = '';
            let date = 1, firstDay = new Date(year, month - 1, 1).getDay(), lastDate = new Date(year, month, 0).getDate();
            let row = document.createElement('tr');
            for(let i=0; i<firstDay; i++) row.appendChild(document.createElement('td'));
            
            for(let d=1; d<=lastDate; d++) {
                if((firstDay + d - 1) % 7 === 0) { tbody.appendChild(row); row = document.createElement('tr'); }
                let cell = document.createElement('td');
                const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                cell.innerHTML = `<strong>${d}</strong>`;
                leaveRecords.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                    cell.innerHTML += `<div class="leave-record">${r.name}-${r.note}</div>`;
                });
                row.appendChild(cell);
            }
            tbody.appendChild(row);
        }

        function changeMonth(d) { currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1); }

        // 初始化
        syncDataFromGoogle();
    </script>
</body>
</html>
