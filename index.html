<!DOCTYPE html>
<html lang="zh-TW"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>金牛頓公司活動行事曆</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f8f9fa; max-width: 1200px; margin: 0 auto; line-height: 1.6; }
        h2 { color: #0d47a1; border-bottom: 3px solid #e0e0e0; padding-bottom: 5px; margin-top: 5px; margin-bottom: 15px; }
        
        select, input[type="date"], input[type="text"], input[type="number"], textarea {
            height: 40px; padding: 8px 12px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; font-size: 14px; vertical-align: middle;
        }
        textarea { height: 80px; }

        table { width: 100%; border-collapse: collapse; background-color: white; margin-bottom: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: center; }
        th { background-color: #e3f2fd; color: #0d47a1; }

        #inputTable select, #inputTable input { width: 100%; }
        
        #calendarContainer { margin-top: 30px; border: 1px solid #0d47a1; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; background: white; }
        #calendarHeader { background-color: #0d47a1; color: white; padding: 15px; font-size: 1.5em; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #calendarHeader button { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 12px; cursor: pointer; border-radius: 4px; font-size: 0.6em; }
        
        #calendar td { height: 110px; vertical-align: top; width: 14.28%; }
        #calendar td:nth-child(1), #calendar th:nth-child(1) { color: #d32f2f; }
        #calendar td:nth-child(7), #calendar th:nth-child(7) { color: #1565c0; }

        #calendarContainer.hide-weekend #calendar th:nth-child(1),
        #calendarContainer.hide-weekend #calendar td:nth-child(1),
        #calendarContainer.hide-weekend #calendar th:nth-child(7),
        #calendarContainer.hide-weekend #calendar td:nth-child(7) { display: none !important; }

        .leave-record { padding: 3px 6px; margin-top: 3px; border-radius: 3px; font-size: 0.85em; text-align: left; border-left: 4px solid #999; background: #eee; word-break: break-all; }
        .activity-record { background-color: #673ab7 !important; color: white !important; }
        .holiday-record { background-color: #e91e63 !important; color: white !important; }

        .suggestion-display-box { background-color: #ffffff; border: 2px solid #ffb74d; border-radius: 8px; padding: 20px; margin-top: 30px; }
        .suggestion-input-box { background-color: #fff3e0; border: 2px solid #ffb74d; border-radius: 8px; padding: 20px; margin-top: 30px; }
        .suggestion-form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        
        .action-section { background: white; padding: 20px; border: 1px solid #ccc; border-radius: 8px; margin-top: 20px; }
        @media print { .no-print, #inputTable, .action-section, .suggestion-input-box, #calendarHeader button, .del-btn { display: none !important; } }
    </style>
</head>
<body>

    <h2>📊 金牛頓公司活動行事曆</h2>
    <table id="inputTable">
        <thead>
            <tr>
                <th>人員</th> <th>事別</th> <th>開始日期</th> <th>結束日期</th>
                <th id="durationHeader" style="display: none;">時數類型</th> <th>說明/原因</th> <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><select id="inputNameSelect" onchange="toggleLeaveTypeOptions()"><option value="請選擇人員" disabled="">請選擇人員</option><option value="金牛頓">金牛頓</option><option value="ERIC">ERIC</option><option value="JAMES">JAMES</option><option value="方順黌">方順黌</option><option value="王冠峯">王冠峯</option><option value="余品橋">余品橋</option><option value="李佩娟">李佩娟</option><option value="高欣宜">高欣宜</option><option value="陳秀燕">陳秀燕</option><option value="陳品鈞">陳品鈞</option><option value="陳靖昂">陳靖昂</option><option value="陳慧真">陳慧真</option><option value="曾晨杰">曾晨杰</option><option value="楊添仰">楊添仰</option><option value="詹淑敏">詹淑敏</option><option value="戴政宏">戴政宏</option><option value="蘇威丞">蘇威丞</option></select></td> 
                <td><select id="inputLeaveType" onchange="toggleInputFields()"><option value="活動">活動</option><option value="假期">假期</option></select></td>
                <td><input type="date" id="inputStartDate"></td>
                <td><input type="date" id="inputEndDate"></td>
                <td id="durationCell" style="display: none;">
                    <select id="inputDurationType" onchange="toggleDurationInput()">
                        <option value="整天">整天</option>
                        <option value="半天">半天</option>
                        <option value="具體時數">具體時數</option>
                    </select>
                    <input type="number" id="inputHours" style="display:none; margin-top:5px;" step="0.5" placeholder="小時">
                </td>
                <td><input type="text" id="inputNote"></td>
                <td><button onclick="addLeaveRecord()" style="background:#4CAF50; color:white; border:none; height:40px; cursor:pointer; border-radius:4px; width:100%; font-weight:bold;">新增</button></td>
            </tr>
        </tbody>
    </table>

    <div id="calendarContainer" class="hide-weekend">
        <div id="calendarHeader">
            <button onclick="changeMonth(-1)">◀ 上個月</button>
            <span id="currentYearMonth">2026年 3月</span>
            <div>
                <button onclick="toggleWeekend()">隱藏/顯示週末</button>
                <button onclick="changeMonth(1)">下個月 ▶</button>
            </div>
        </div>
        <table id="calendar"><thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead><tbody></tbody></table>
    </div>

    <div class="suggestion-display-box">
        <h3 style="margin-top:0; color: #e65100;">📋 公司活動建議內容</h3>
        <table id="suggestionTable">
            <thead><tr><th style="width:20%">活動名稱</th><th style="width:70%">建議詳情</th><th style="width:10%">操作</th></tr></thead>
            <tbody id="suggestionList"></tbody>
        </table>
    </div>

    <div class="action-section">
        <h3 style="margin-top:0;">🔍 紀錄查詢、備份與匯出</h3>
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
            <select id="queryNameSelect" style="min-width:150px; height:40px;"></select>
            <input type="date" id="queryStartDate"> 至 <input type="date" id="queryEndDate">
            <button onclick="queryRecords()" style="height:40px; background:#007bff; color:white; border:none; padding:0 20px; border-radius:4px; cursor:pointer;">查詢</button>
            <button onclick="exportToExcel()" style="height:40px; background:#ef6c00; color:white; border:none; padding:0 15px; border-radius:4px; cursor:pointer;">📊 查詢匯出</button>
            <button onclick="exportBackupJSON()" style="height:40px; background:#5d4037; color:white; border:none; padding:0 15px; border-radius:4px; cursor:pointer;">📤 匯出</button>
            <input type="file" id="importFile" style="display:none" onchange="importBackupJSON(this)">
            <button onclick="document.getElementById('importFile').click()" style="height:40px; background:#00796b; color:white; border:none; padding:0 15px; border-radius:4px; cursor:pointer;">📥 匯入</button>
            <button onclick="saveFullHTML()" style="height:40px; background:#2e7d32; color:white; border:none; padding:0 15px; border-radius:4px; cursor:pointer;">💾 儲存</button>
            <button onclick="window.print()" style="height:40px; background:#607d8b; color:white; border:none; padding:0 15px; border-radius:4px; cursor:pointer;">🖨️ 列印</button>
        </div>
    </div>

    <div id="queryResultArea"></div>

    <div class="suggestion-input-box">
        <h3 style="margin-top:0; color: #e65100;">💡 新增建議內容</h3>
        <div class="suggestion-form-row">
            <input type="text" id="suggestTitle" style="flex:1" placeholder="活動建議名稱">
            <input type="text" id="suggestImgUrl" style="flex:1" placeholder="圖片連結網址 (選填)">
        </div>
        <div class="suggestion-form-row">
            <textarea id="suggestContent" style="flex:3" placeholder="請輸入建議項目..."></textarea>
        </div>
        <div style="text-align:right;"><button onclick="addSuggestion()" style="background:#ff9800; color:white; border:none; padding:10px 30px; border-radius:4px; font-weight:bold; cursor:pointer; height:40px;">提交建議</button></div>
    </div>

    <script>
        let currentDisplayDate = new Date();
        const STORAGE_KEY = 'leaveCalendarRecords';
        const SUGGEST_KEY = 'companyActivitySuggestions';
        const GOOGLE_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        const nameList = ["請選擇人員", "金牛頓", "ERIC", "JAMES", "方順黌", "王冠峯", "余品橋", "李佩娟", "高欣宜", "陳秀燕", "陳品鈞", "陳靖昂", "陳慧真", "曾晨杰", "楊添仰", "詹淑敏", "戴政宏", "蘇威丞"];
        const ADMIN_PASSWORD = "AB)&@)cd0526";

        let leaveRecords = [];
        let suggestions = JSON.parse(localStorage.getItem(SUGGEST_KEY)) || [];

        async function fetchGoogleData() {
            try {
                const response = await fetch(GOOGLE_CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                leaveRecords = rows.filter(row => row.trim() !== '').map((row, index) => {
                    const cols = row.split(',');
                    return { id: Date.now() + index, name: cols[0], type: cols[1], start: cols[2], end: cols[3], displayDuration: cols[4], note: cols[5] || '', calcValue: 1 };
                });
                renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1);
            } catch (e) {
                console.error("無法讀取 Google 資料", e);
                leaveRecords = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            }
        }

        function toggleWeekend() { document.getElementById('calendarContainer').classList.toggle('hide-weekend'); }
        function toggleLeaveTypeOptions() { const sel = document.getElementById('inputNameSelect').value; const ts = document.getElementById('inputLeaveType'); ts.innerHTML = ''; if (sel === '金牛頓') { ["活動", "假期"].forEach(o => ts.add(new Option(o, o))); } else { ["特休", "事假", "病假", "公假", "出差", "喪假"].forEach(o => ts.add(new Option(o, o))); } toggleInputFields(); }
        function toggleInputFields() { const isSpec = ['活動', '假期'].includes(document.getElementById('inputLeaveType').value); document.getElementById('durationCell').style.display = isSpec ? 'none' : 'table-cell'; document.getElementById('durationHeader').style.display = isSpec ? 'none' : 'table-cell'; }
        function toggleDurationInput() { document.getElementById('inputHours').style.display = document.getElementById('inputDurationType').value === '具體時數' ? 'block' : 'none'; }
        function addLeaveRecord() { const n = document.getElementById('inputNameSelect').value; const s = document.getElementById('inputStartDate').value; const e = document.getElementById('inputEndDate').value; const nt = document.getElementById('inputNote').value.trim(); const leaveType = document.getElementById('inputLeaveType').value; if (!s || !e || n === "請選擇人員") return alert("請完整填寫姓名與日期"); const durType = document.getElementById('inputDurationType').value; const hrs = document.getElementById('inputHours').value; let durationText = durType; let numericVal = 1; if (leaveType === '活動' || leaveType === '假期') { durationText = '整天'; numericVal = (Math.ceil(Math.abs(new Date(e) - new Date(s)) / (1000 * 60 * 60 * 24)) + 1); } else { if (durType === '半天') { numericVal = 0.5; } else if (durType === '具體時數') { durationText = hrs + "小時"; numericVal = parseFloat(hrs) / 8; } else { numericVal = (Math.ceil(Math.abs(new Date(e) - new Date(s)) / (1000 * 60 * 60 * 24)) + 1); } } leaveRecords.push({ id: Date.now(), name: n, type: leaveType, start: s, end: e, note: nt, displayDuration: durationText, calcValue: parseFloat(numericVal.toFixed(3)) }); localStorage.setItem(STORAGE_KEY, JSON.stringify(leaveRecords)); renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1); alert("已新增"); }
        function queryRecords() { const qName = document.getElementById('queryNameSelect').value, s = document.getElementById('queryStartDate').value, e = document.getElementById('queryEndDate').value; if (!s || !e) return alert("請選日期範圍後再執行查詢"); let res = leaveRecords.filter(r => ((r.start >= s && r.start <= e) || (r.end >= s && r.end <= e)) && (qName === "全部人員" || r.name === qName)); res.sort((a, b) => a.start < b.start ? -1 : 1); let stats = {}; let h = `<table><thead><tr><th>姓名</th><th>事別</th><th>開始日期</th><th>結束日期</th><th>時數/天數</th><th>說明/原因</th><th>操作</th></tr></thead><tbody>`; res.forEach(r => { const dur = r.displayDuration || "1天"; stats[r.type] = (stats[r.type] || 0) + (r.calcValue || 1); h += `<tr><td>${r.name}</td><td>${r.type}</td><td>${r.start}</td><td>${r.end}</td><td style="color:red; font-weight:bold;">${dur}</td><td style="text-align:left;">${r.note}</td><td><button onclick="doDelete('${r.id}')" style="background:#f44336; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">刪除</button></td></tr>`; }); if (res.length > 0) { let stText = Object.keys(stats).map(k => `${k}: ${stats[k].toFixed(2)}天`).join(' | '); h += `<tr style="background:#fff9c4; font-weight:bold;"><td colspan="4">統計摘要</td><td colspan="3">${stText}</td></tr>`; } else { h += `<tr><td colspan="7">此範圍內查無資料</td></tr>`; } document.getElementById('queryResultArea').innerHTML = h + '</tbody></table>'; }
        function exportToExcel() { const qName = document.getElementById('queryNameSelect').value, s = document.getElementById('queryStartDate').value, e = document.getElementById('queryEndDate').value; if (!s || !e) return alert("請先選取日期範圍並執行查詢後再匯出"); let res = leaveRecords.filter(r => ((r.start >= s && r.start <= e) || (r.end >= s && r.end <= e)) && (qName === "全部人員" || r.name === qName)); if (res.length === 0) return alert("目前查詢範圍內無資料可匯出"); let csvContent = "\ufeff姓名,事別,開始日期,結束日期,時數/天數,說明/原因\n"; res.forEach(r => { csvContent += `${r.name},${r.type},${r.start},${r.end},${r.displayDuration || "1天"},${r.note.replace(/,/g, "，")}\n`; }); const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }); const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `金牛頓查詢紀錄_${s}_至_${e}.csv`; link.click(); }
        function doDelete(id) { if (confirm("確定刪除？")) { const pwd = prompt("請輸入密碼："); if (pwd === ADMIN_PASSWORD) { leaveRecords = leaveRecords.filter(r => String(r.id) !== String(id)); localStorage.setItem(STORAGE_KEY, JSON.stringify(leaveRecords)); renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1); const s = document.getElementById('queryStartDate').value, e = document.getElementById('queryEndDate').value; if(s && e) { queryRecords(); } else { document.getElementById('queryResultArea').innerHTML = ""; } } else if (pwd !== null) { alert("密碼錯誤"); } } }

        function renderCalendar(year, month) {
            const calendarEl = document.getElementById('calendar');
            document.getElementById('currentYearMonth').textContent = `${year}年 ${month}月`;
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            let html = '<thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead><tbody>';
            const firstDay = new Date(year, month - 1, 1).getDay(), lastDate = new Date(year, month, 0).getDate();
            let date = 1;
            for (let i = 0; i < 6; i++) {
                let row = '<tr>';
                for (let j = 0; j < 7; j++) {
                    if ((i === 0 && j < firstDay) || date > lastDate) { row += '<td style="background:#f9f9f9;"></td>'; } 
                    else {
                        const ds = `${year}-${String(month).padStart(2,'0')}-${String(date).padStart(2,'0')}`;
                        const isToday = (ds === todayStr);
                        row += `<td style="${isToday ? 'background-color: #fff9c4;' : ''}"><div style="font-weight:bold;text-align:right;">${date}</div>`;
                        leaveRecords.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                            // 修正邏輯：使用 includes 確保底色判定更寬容
                            let tc = r.type.includes('活動') ? 'activity-record' : (r.type.includes('假') ? 'holiday-record' : 'leave-record');
                            let durLabel = (r.displayDuration && r.displayDuration !== '整天') ? `(${r.displayDuration})` : '';
                            row += `<div class="leave-record ${tc}">${r.name}-${r.note}${durLabel}</div>`;
                        });
                        row += `</td>`; date++;
                    }
                }
                html += row + '</tr>'; if (date > lastDate && i >= 4) break; 
            }
            calendarEl.innerHTML = html + '</tbody>';
        }

        function addSuggestion() { const t = document.getElementById('suggestTitle').value.trim(); const c = document.getElementById('suggestContent').value.trim(); const img = document.getElementById('suggestImgUrl').value.trim(); if(!t || !c) return alert("請填寫內容"); suggestions.push({ id: Date.now(), title: t, content: c, imageUrl: img }); localStorage.setItem(SUGGEST_KEY, JSON.stringify(suggestions)); renderSuggestions(); document.getElementById('suggestTitle').value = ''; document.getElementById('suggestContent').value = ''; document.getElementById('suggestImgUrl').value = ''; }
        function deleteSuggestion(id) { if (confirm("確定刪除此建議內容？")) { const pwd = prompt("請輸入密碼："); if (pwd === ADMIN_PASSWORD) { suggestions = suggestions.filter(s => String(s.id) !== String(id)); localStorage.setItem(SUGGEST_KEY, JSON.stringify(suggestions)); renderSuggestions(); } else if (pwd !== null) { alert("密碼錯誤"); } } }
        function renderSuggestions() { document.getElementById('suggestionList').innerHTML = suggestions.map(s => { const imgTag = s.imageUrl ? `<div style="margin-top:10px;"><a href="${s.imageUrl}" target="_blank"><img src="${s.imageUrl}" alt="圖片" style="max-width:150px; max-height:150px; border:1px solid #ccc; border-radius:4px; cursor:pointer;"></a><div style="font-size:11px; color:#888;">(點擊放大原圖)</div></div>` : ''; return `<tr><td style="font-weight:bold;">${s.title}</td><td style="text-align:left; white-space:pre-wrap;">${s.content}${imgTag}</td><td><button onclick="deleteSuggestion('${s.id}')" class="del-btn" style="background:#f44336; color:white; border:none; padding:5px 8px; border-radius:4px; cursor:pointer;">刪除</button></td></tr>`; }).join(''); }
        function exportBackupJSON() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify({records: leaveRecords, suggestions: suggestions})], {type: 'application/json'})); a.download = "金牛頓備份.json"; a.click(); }
        function importBackupJSON(input) { if(!input.files[0]) return; const reader = new FileReader(); reader.onload = (e) => { const data = JSON.parse(e.target.result); localStorage.setItem(STORAGE_KEY, JSON.stringify(data.records || [])); localStorage.setItem(SUGGEST_KEY, JSON.stringify(data.suggestions || [])); location.reload(); }; reader.readAsText(input.files[0]); }
        function changeMonth(d) { currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1); }
        function saveFullHTML() { const queryArea = document.getElementById('queryResultArea'); const originalContent = queryArea.innerHTML; queryArea.innerHTML = ""; const blob = new Blob(['<!DOCTYPE html>\n' + document.documentElement.outerHTML], { type: 'text/html' }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `金牛頓行事曆_${new Date().toISOString().split('T')[0]}.html`; a.click(); queryArea.innerHTML = originalContent; }

        document.addEventListener('DOMContentLoaded', () => {
            const sel = document.getElementById('inputNameSelect'), qSel = document.getElementById('queryNameSelect');
            nameList.forEach(n => sel.add(new Option(n, n))); 
            sel.options[0].disabled = true;
            qSel.add(new Option("全部人員", "全部人員")); 
            nameList.slice(1).forEach(n => qSel.add(new Option(n, n)));
            toggleLeaveTypeOptions(); 
            fetchGoogleData(); 
            renderSuggestions();
        });
    </script>
</body></html>
