<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金牛頓公司活動行事曆</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f8f9fa; max-width: 1200px; margin: 0 auto; line-height: 1.6; }
        h2 { color: #0d47a1; border-bottom: 3px solid #e0e0e0; padding-bottom: 10px; text-align: center; }
        
        table { width: 100%; border-collapse: collapse; background-color: white; margin-bottom: 20px; table-layout: fixed; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: center; vertical-align: middle; }
        th { background-color: #e3f2fd; color: #0d47a1; font-weight: bold; }
        
        #calendar td { height: 150px; vertical-align: top; }
        .date-number { display: block; font-weight: bold; margin-bottom: 5px; text-align: center; }
        
        /* 活動紀錄樣式 */
        .leave-record { 
            padding: 4px 6px; margin: 2px auto; border-radius: 3px; font-size: 0.85em; 
            text-align: left; width: 90%; word-wrap: break-word;
        }
        
        #calendarHeader { background-color: #0d47a1; color: white; padding: 15px; font-size: 1.5em; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-radius: 8px 8px 0 0; }
        button { cursor: pointer; padding: 8px 15px; }
    </style>
</head>
<body>

    <h2>📊 金牛頓公司行事曆</h2>

    <div id="calendarContainer">
        <div id="calendarHeader">
            <button onclick="changeMonth(-1)">◀ 上個月</button>
            <span id="currentYearMonth"></span>
            <button onclick="changeMonth(1)">下個月 ▶</button>
        </div>
        <table id="calendar">
            <thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        let leaveRecords = [];
        let currentDisplayDate = new Date();

        async function fetchData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                leaveRecords = text.split('\n').slice(1).filter(r => r.trim()).map(r => {
                    const c = r.split(',');
                    return { name: c[0]?.trim(), type: c[1]?.trim(), start: c[2]?.trim(), end: c[3]?.trim(), note: c[5]?.trim() };
                });
                renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1);
            } catch (e) { console.error("資料讀取失敗", e); }
        }

        function renderCalendar(year, month) {
            document.getElementById('currentYearMonth').textContent = `${year}年 ${month}月`;
            const tbody = document.querySelector('#calendar tbody');
            tbody.innerHTML = '';
            
            let firstDay = new Date(year, month - 1, 1).getDay();
            let lastDate = new Date(year, month, 0).getDate();
            let row = document.createElement('tr');
            
            for(let i=0; i<firstDay; i++) row.appendChild(document.createElement('td'));
            
            for(let d=1; d<=lastDate; d++) {
                if((firstDay + d - 1) % 7 === 0 && d > 1) { tbody.appendChild(row); row = document.createElement('tr'); }
                
                let cell = document.createElement('td');
                const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                cell.innerHTML = `<span class="date-number">${d}</span>`;
                
                leaveRecords.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                    // 這裡直接定義顏色，不依賴外部 CSS class
                    let style = "background-color: #eee; color: #333; border-left: 5px solid #999;";
                    if (r.type && r.type.includes('金牛頓')) {
                        style = "background-color: #0d47a1; color: #ffffff; border-left: 5px solid #002171;";
                    } else if (r.type === '出差') {
                        style = "background-color: #bbdefb; color: #0d47a1; border-left: 5px solid #1976d2;";
                    }
                    
                    cell.innerHTML += `<div class="leave-record" style="${style}">${r.name}<br>${r.note}</div>`;
                });
                row.appendChild(cell);
            }
            tbody.appendChild(row);
        }

        function changeMonth(d) { 
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); 
            renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1); 
        }

        fetchData();
    </script>
</body>
</html>
