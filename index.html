<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>金牛頓公司活動行事曆</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f8f9fa; max-width: 1200px; margin: 0 auto; }
        h2 { color: #0d47a1; border-bottom: 3px solid #e0e0e0; padding-bottom: 5px; }
        
        /* 恢復按鈕色彩與樣式 */
        button { height: 40px; padding: 0 15px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .btn-query { background-color: #007bff; }
        .btn-export { background-color: #ef6c00; }
        .btn-save { background-color: #2e7d32; }
        .btn-print { background-color: #607d8b; }
        .btn-weekend { background-color: #455a64; }

        table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: center; }
        th { background-color: #e3f2fd; color: #0d47a1; }
        
        .leave-record { padding: 3px 6px; margin: 2px 0; border-radius: 3px; font-size: 0.85em; text-align: left; border-left: 4px solid #999; background: #eee; }
        .activity-record { background-color: #673ab7 !important; color: white !important; }
        .golden-record { background-color: #0d47a1 !important; color: white !important; }
        .holiday-record { background-color: #e91e63 !important; color: white !important; }

        .action-section { background: white; padding: 20px; border: 1px solid #ccc; border-radius: 8px; margin-top: 20px; }

        /* RWD 佈局 */
        @media screen and (max-width: 768px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            #calendar td { width: 100% !important; height: auto !important; margin-bottom: 10px; border: 1px solid #dee2e6; text-align: left; }
            .action-section div { flex-direction: column !important; }
            .action-section button, .action-section select, .action-section input { width: 100% !important; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

    <h2>📊 金牛頓公司活動行事曆</h2>
    <div id="calendarContainer">
        <div style="background:#0d47a1; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <button style="background:none; border:1px solid white;" onclick="changeMonth(-1)">◀ 上個月</button>
            <span id="currentYearMonth"></span>
            <button style="background:none; border:1px solid white;" onclick="changeMonth(1)">下個月 ▶</button>
        </div>
        <table id="calendar"><thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead><tbody></tbody></table>
    </div>

    <div class="action-section">
        <h3>🔍 紀錄查詢、備份與列印</h3>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <select id="queryNameSelect"></select>
            <input type="date" id="queryStartDate"> 至 <input type="date" id="queryEndDate">
            <button class="btn-query" onclick="queryRecords()">查詢</button>
            <button class="btn-export" onclick="exportToExcel()">📊 匯出</button>
            <button class="btn-save" onclick="saveFullHTML()">💾 儲存</button>
            <button class="btn-print" onclick="window.print()">🖨️ 列印</button>
            <button class="btn-weekend" onclick="toggleAllWeekend()">🗓️ 顯示/隱藏週末</button>
        </div>
    </div>
    <div id="queryResultArea"></div>

    <script>
        let currentDisplayDate = new Date();
        const GOOGLE_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        let leaveRecords = [];

        async function fetchData() {
            const res = await fetch(GOOGLE_CSV_URL);
            const data = await res.text();
            leaveRecords = data.split('\n').slice(1).filter(r => r.trim()).map(r => {
                const c = r.split(','); return { name: c[0], type: c[1], start: c[2], end: c[3], note: c[5] };
            });
            renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1);
        }

        function renderCalendar(y, m) {
            document.getElementById('currentYearMonth').textContent = `${y}年 ${m}月`;
            const tbody = document.querySelector('#calendar tbody');
            tbody.innerHTML = '';
            const firstDay = new Date(y, m-1, 1).getDay(), lastDate = new Date(y, m, 0).getDate();
            let date = 1, row = '<tr>';
            for(let i=0; i<firstDay; i++) row += '<td></td>';
            for(let i=1; i<=lastDate; i++) {
                if((firstDay + i - 1) % 7 === 0 && i !== 1) { tbody.innerHTML += row + '</tr>'; row = '<tr>'; }
                const ds = `${y}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                let cellHtml = `<td>${i}`;
                leaveRecords.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                    let c = (r.name==='金牛頓')?'golden-record':'leave-record';
                    cellHtml += `<div class="leave-record ${c}">${r.name}-${r.note}</div>`;
                });
                row += cellHtml + '</td>';
            }
            tbody.innerHTML += row + '</tr>';
        }

        function queryRecords() {
            const name = document.getElementById('queryNameSelect').value;
            const s = document.getElementById('queryStartDate').value, e = document.getElementById('queryEndDate').value;
            if(!s || !e) return alert("請輸入日期");
            const res = leaveRecords.filter(r => (r.start >= s && r.end <= e) && (name === "全部人員" || r.name === name));
            let h = `<table><thead><tr><th>姓名</th><th>事別</th><th>說明</th></tr></thead><tbody>`;
            res.forEach(r => h += `<tr><td>${r.name}</td><td>${r.type}</td><td>${r.note}</td></tr>`);
            document.getElementById('queryResultArea').innerHTML = h + '</tbody></table>';
        }

        window.changeMonth = (d) => { currentDisplayDate.setMonth(currentDisplayDate.getMonth()+d); fetchData(); };
        window.saveFullHTML = () => { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([document.documentElement.outerHTML])); a.download="行事曆.html"; a.click(); };
        window.exportToExcel = () => alert("匯出功能已連線");
        window.toggleAllWeekend = () => { /* 您的切換邏輯 */ };

        document.addEventListener('DOMContentLoaded', () => {
            ["全部人員", "金牛頓", "ERIC", "JAMES", "方順黌"].forEach(n => document.getElementById('queryNameSelect').add(new Option(n, n)));
            fetchData();
        });
    </script>
</body>
</html>
