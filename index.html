<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>金牛頓公司行事曆</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background-color: #f8f9fa; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background-color: #e3f2fd; height: 40px; }
        td { border: 1px solid #dee2e6; height: 150px; vertical-align: top; padding: 8px; }
        /* 統一定義顯示樣式 */
        .record-box { 
            padding: 4px; margin-bottom: 4px; border-radius: 4px; 
            font-size: 0.9em; word-wrap: break-word; color: white;
        }
    </style>
</head>
<body>
    <h2>金牛頓公司行事曆</h2>
    <table id="calendar">
        <thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead>
        <tbody></tbody>
    </table>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        let leaveRecords = [];

        async function fetchData() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            leaveRecords = rows.filter(r => r.trim()).map(r => {
                const c = r.split(',');
                return { name: c[0]?.trim(), type: c[1]?.trim(), start: c[2]?.trim(), end: c[3]?.trim(), note: c[5]?.trim() };
            });
            renderCalendar(2026, 3); // 測試 2026 年 3 月
        }

        function renderCalendar(year, month) {
            const tbody = document.querySelector('#calendar tbody');
            tbody.innerHTML = '<tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>';
            
            // 簡單渲染測試：直接把資料印出來看看
            leaveRecords.forEach(r => {
                console.log("正在處理資料:", r.name, "類型:", r.type);
                let bgColor = "#999"; // 預設灰色
                if (r.type && r.type.includes("金牛頓")) bgColor = "#0d47a1"; // 深藍
                if (r.type && r.type.includes("出差")) bgColor = "#1976d2"; // 藍
                
                // 找到對應的儲存格 (簡化版)
                const cells = document.querySelectorAll('td');
                cells[10].innerHTML += `<div class="record-box" style="background-color: ${bgColor};">${r.name}<br>${r.note}</div>`;
            });
        }
        fetchData();
    </script>
</body>
</html>
