<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金牛頓公司行事曆</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; background-color: #f8f9fa; margin: 0; }
        h2 { color: #0d47a1; margin: 10px 0; font-size: 1.5em; text-align: center; }
        
        /* 響應式容器：手機上自動滿版 */
        #calendarContainer { border: 2px solid #0d47a1; background: white; border-radius: 8px; overflow: hidden; width: 100%; max-width: 1200px; margin: 0 auto; }
        #calendarHeader { background-color: #0d47a1; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 5px; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background-color: #e3f2fd; color: #1565c0; padding: 8px 0; text-align: center; font-size: 0.9em; height: 35px; }
        td { border: 1px solid #dee2e6; height: 120px; vertical-align: top; padding: 4px; font-size: 0.85em; overflow-y: auto; }
        
        /* 手機版字體微調 */
        @media (max-width: 600px) {
            td { height: 90px; font-size: 0.7em; }
            .leave-record { font-size: 0.75em !important; }
        }
        
        .hide-weekend .col-sat, .hide-weekend .col-sun { display: none; }
        .is-today { background-color: #fff9c4 !important; }
        
        .leave-record { 
            padding: 2px 4px; margin-top: 2px; border-radius: 3px; 
            line-height: 1.2; word-wrap: break-word; display: block;
        }
    </style>
</head>
<body>

    <h2>金牛頓公司行事曆</h2>
    
    <div id="calendarContainer">
        <div id="calendarHeader">
            <button onclick="changeMonth(-1)">◀ 上個月</button>
            <span id="currentYearMonth" style="font-weight:bold;"></span>
            <label><input type="checkbox" id="toggleWeekend" checked onchange="toggleWeekend()"> 顯示週末</label>
            <button onclick="changeMonth(1)">下個月 ▶</button>
        </div>
        <table id="calendar">
            <thead>
                <tr>
                    <th class="col-sun">日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th class="col-sat">六</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        let leaveRecords = [];
        let currentDisplayDate = new Date();

        function toggleWeekend() {
            const isChecked = document.getElementById('toggleWeekend').checked;
            document.getElementById('calendar').classList.toggle('hide-weekend', !isChecked);
        }

        async function fetchData() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').slice(1);
                leaveRecords = rows.filter(r => r.trim()).map(r => {
                    const c = r.split(',');
                    return { name: c[0]?.trim(), type: c[1]?.trim(), start: c[2]?.trim(), end: c[3]?.trim(), note: c[5]?.trim() };
                });
                renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1);
            } catch (e) { console.error("資料讀取失敗", e); }
        }

        function renderCalendar(year, month) {
            document.getElementById('currentYearMonth').textContent = `${year}年 ${month}月`;
            const tbody = document.querySelector('#calendar tbody');
            tbody.innerHTML = '';
            
            const todayStr = new Date().toISOString().split('T')[0];
            let firstDay = new Date(year, month - 1, 1).getDay();
            let lastDate = new Date(year, month, 0).getDate();
            let row = document.createElement('tr');
            
            for(let i=0; i<firstDay; i++) {
                let cell = document.createElement('td');
                if(i === 0) cell.className = 'col-sun';
                if(i === 6) cell.className = 'col-sat';
                row.appendChild(cell);
            }
            
            for(let d=1; d<=lastDate; d++) {
                let dayOfWeek = (firstDay + d - 1) % 7;
                if(dayOfWeek === 0 && d > 1) { tbody.appendChild(row); row = document.createElement('tr'); }
                
                let cell = document.createElement('td');
                if(dayOfWeek === 0) cell.className = 'col-sun';
                if(dayOfWeek === 6) cell.className = 'col-sat';
                
                const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                if (ds === todayStr) cell.className += ' is-today';
                
                cell.innerHTML = `<strong>${d}</strong>`;
                
                leaveRecords.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                    // 這裡暫時統一設為灰色，等您休息回來，我們再專門解決金牛頓的底色比對問題
                    let bg = "#eee", color = "#333", border = "#999";
                    
                    cell.innerHTML += `<div class="leave-record" style="background-color:${bg}; color:${color}; border-left:3px solid ${border};">${r.name}<br>${r.note}</div>`;
                });
                row.appendChild(cell);
            }
            tbody.appendChild(row);
            toggleWeekend();
        }

        function changeMonth(d) { 
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); 
            renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1); 
        }

        fetchData();
    </script>
</body>
</html>
