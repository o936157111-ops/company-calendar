<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>金牛頓公司行事曆</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f8f9fa; max-width: 1200px; margin: 0 auto; line-height: 1.6; }
        h2 { color: #0d47a1; border-bottom: 3px solid #e0e0e0; padding-bottom: 5px; margin-top: 5px; margin-bottom: 15px; }
        
        /* 美化查詢區塊 */
        #querySection { background: #ffffff; padding: 25px; border: none; margin-top: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 美化按鈕 */
        button { background: linear-gradient(135deg, #0d47a1, #1976d2); color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: transform 0.2s, background 0.3s; }
        button:hover { background: linear-gradient(135deg, #1565c0, #1e88e5); transform: translateY(-2px); }

        /* 美化表格 */
        #resultTable { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #dee2e6; }
        #resultTable th { background-color: #f8f9fa; color: #333; padding: 12px; border-bottom: 2px solid #0d47a1; }
        #resultTable td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        #resultTable tr:hover { background-color: #f1f7ff; }

        /* 既有樣式 */
        table { width: 100%; border-collapse: collapse; background-color: white; margin-bottom: 20px; table-layout: fixed; }
        th, td { border: 1px solid #dee2e6; padding: 5px; text-align: center; height: 110px; vertical-align: top; }
        #summaryArea { margin-top:15px; padding:15px; background:#e3f2fd; border-radius:4px; font-weight:bold; color:#0d47a1; display:none; }
    </style>
</head>
<body>

    <h2>📊 金牛頓公司行事曆</h2>
    <div id="querySection">
        <h3>🔍 紀錄查詢</h3>
        <select id="nameSelect"><option value="ALL">全部人員</option></select>
        <input type="date" id="startDate"> 至 <input type="date" id="endDate">
        <button onclick="performQuery()">查詢</button>
        
        <div id="summaryArea">
            統計摘要: <span id="summaryText"></span>
        </div>

        <table id="resultTable">
            <thead><tr><th>姓名</th><th>事別</th><th>開始日期</th><th>結束日期</th><th>天數(折算)</th><th>說明</th></tr></thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <script>
        // ... (CSV_URL 與 fetchGoogleData 維持原樣) ...
        
        function performQuery() {
            const name = document.getElementById('nameSelect').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const tbody = document.getElementById('resultBody');
            const summaryArea = document.getElementById('summaryArea');
            const summaryText = document.getElementById('summaryText');
            tbody.innerHTML = '';
            
            const filtered = leaveRecords.filter(r => (name === 'ALL' || r.name === name) && (start === '' || r.start >= start) && (end === '' || r.end <= end));
            const stats = {};

            filtered.forEach(r => {
                let val = 0;
                let displayDays = "";
                
                // 優先使用 CSV 中的 duration 欄位
                if (r.duration && r.duration.trim() !== "") {
                    let d = r.duration.trim();
                    if (d.includes('全天') || d === '1') val = 1.0;
                    else if (d.includes('半天') || d === '0.5') val = 0.5;
                    else if (d.includes('小時')) val = (parseFloat(d) || 0) / 8;
                    else val = parseFloat(d) || 0;
                    displayDays = val + "天";
                } else {
                    // 若 CSV 為空，才使用日期差計算
                    val = (new Date(r.end) - new Date(r.start)) / (1000 * 60 * 60 * 24) + 1;
                    displayDays = val + "天(自動)";
                }
                
                stats[r.type] = (stats[r.type] || 0) + val;
                tbody.innerHTML += `<tr><td>${r.name}</td><td>${r.type}</td><td>${r.start}</td><td>${r.end}</td><td>${displayDays}</td><td>${r.note}</td></tr>`;
            });

            const summaryArr = Object.entries(stats).map(([type, total]) => `${type}: ${total.toFixed(2)}天`);
            if (summaryArr.length > 0) { summaryText.textContent = summaryArr.join(' | '); summaryArea.style.display = 'block'; }
            else { summaryArea.style.display = 'none'; }
        }
        // ... (其他既有函數) ...
    </script>
</body>
</html>
