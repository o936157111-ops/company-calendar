<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金牛頓公司行事曆</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; background-color: #f8f9fa; margin: 0; }
        h2 { color: #0d47a1; margin: 10px 0; font-size: 1.5em; text-align: center; }
        
        #calendarContainer { border: 2px solid #0d47a1; background: white; border-radius: 8px; overflow: hidden; width: 100%; max-width: 1200px; margin: 0 auto; }
        
        /* 搜尋面板樣式 */
        #searchPanel { background-color: #e3f2fd; padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; border-bottom: 2px solid #0d47a1; }
        #searchPanel input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        #calendarHeader { background-color: #0d47a1; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background-color: #e3f2fd; color: #1565c0; padding: 8px 0; text-align: center; font-size: 0.9em; height: 35px; }
        td { border: 1px solid #dee2e6; height: 120px; vertical-align: top; padding: 4px; font-size: 0.85em; overflow-y: auto; }
        
        @media (max-width: 600px) {
            td { height: 90px; font-size: 0.7em; }
            .leave-record { font-size: 0.75em !important; }
        }
        
        .is-today { background-color: #fff9c4 !important; }
        .leave-record { padding: 2px 4px; margin-top: 2px; border-radius: 3px; line-height: 1.2; word-wrap: break-word; display: block; }
    </style>
</head>
<body>

    <h2>金牛頓公司行事曆</h2>
    
    <div id="calendarContainer">
        <div id="searchPanel">
            <input type="text" id="nameSearch" placeholder="姓名搜尋..." oninput="renderCalendar()">
            <input type="date" id="startDate" onchange="renderCalendar()"> 至
            <input type="date" id="endDate" onchange="renderCalendar()">
            <button onclick="clearSearch()">清除</button>
        </div>

        <div id="calendarHeader">
            <button onclick="changeMonth(-1)">◀ 上個月</button>
            <span id="currentYearMonth" style="font-weight:bold;"></span>
            <label><input type="checkbox" id="toggleWeekend" checked onchange="renderCalendar()"> 顯示週末</label>
            <button onclick="changeMonth(1)">下個月 ▶</button>
        </div>
        <table id="calendar">
            <thead>
                <tr><th class="col-sun">日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th class="col-sat">六</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        let leaveRecords = [];
        let currentDisplayDate = new Date();

        async function fetchData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                leaveRecords = text.split('\n').slice(1).filter(r => r.trim()).map(r => {
                    const c = r.split(',');
                    return { name: c[0]?.trim(), type: c[1]?.trim(), start: c[2]?.trim(), end: c[3]?.trim(), note: c[5]?.trim() };
                });
                renderCalendar();
            } catch (e) { console.error(e); }
        }

        function renderCalendar() {
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth() + 1;
            document.getElementById('currentYearMonth').textContent = `${year}年 ${month}月`;
            
            const tbody = document.querySelector('#calendar tbody');
            tbody.innerHTML = '';
            
            // 搜尋條件
            const nameKey = document.getElementById('nameSearch').value.toLowerCase();
            const startKey = document.getElementById('startDate').value;
            const endKey = document.getElementById('endDate').value;
            const showWeekend = document.getElementById('toggleWeekend').checked;

            const todayStr = new Date().toISOString().split('T')[0];
            let firstDay = new Date(year, month - 1, 1).getDay();
            let lastDate = new Date(year, month, 0).getDate();
            let row = document.createElement('tr');
            
            for(let i=0; i<firstDay; i++) row.appendChild(document.createElement('td'));
            
            for(let d=1; d<=lastDate; d++) {
                let dayOfWeek = (firstDay + d - 1) % 7;
                if(dayOfWeek === 0 && d > 1) { tbody.appendChild(row); row = document.createElement('tr'); }
                if (!showWeekend && (dayOfWeek === 0 || dayOfWeek === 6)) { row.appendChild(document.createElement('td')); continue; }
                
                let cell = document.createElement('td');
                const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                if (ds === todayStr) cell.classList.add('is-today');
                cell.innerHTML = `<strong>${d}</strong>`;
                
                leaveRecords.filter(r => {
                    const matchName = r.name.toLowerCase().includes(nameKey);
                    const matchStart = startKey ? ds >= startKey : true;
                    const matchEnd = endKey ? ds <= endKey : true;
                    const matchDate = ds >= r.start && ds <= r.end;
                    return matchName && matchStart && matchEnd && matchDate;
                }).forEach(r => {
                    // 金牛頓底色問題：這裡我們改用最嚴格的判斷
                    let bg = "#eee", color = "#333", border = "#999";
                    if (r.type && r.type.includes('金牛頓')) { bg = "#0d47a1"; color = "#fff"; border = "#002171"; }
                    else if (r.type && r.type.includes('出差')) { bg = "#bbdefb"; color = "#0d47a1"; border = "#1976d2"; }
                    cell.innerHTML += `<div class="leave-record" style="background-color:${bg}; color:${color}; border-left:3px solid ${border};">${r.name}<br>${r.note}</div>`;
                });
                row.appendChild(cell);
            }
            tbody.appendChild(row);
        }

        function changeMonth(d) { currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); renderCalendar(); }
        function clearSearch() { 
            document.getElementById('nameSearch').value = '';
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            renderCalendar();
        }
        fetchData();
    </script>
</body>
</html>
