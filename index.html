<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金牛頓公司活動行事曆</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f8f9fa; max-width: 1200px; margin: 0 auto; }
        h2 { color: #0d47a1; border-bottom: 3px solid #e0e0e0; padding-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; background-color: white; margin-bottom: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: center; }
        th { background-color: #e3f2fd; }
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>金牛頓公司活動行事曆</h2>
    
    <div class="calendar-nav">
        <button onclick="changeMonth(-1)">上個月</button>
        <h3 id="monthLabel"></h3>
        <button onclick="changeMonth(1)">下個月</button>
    </div>

    <table id="calendarTable">
        <thead>
            <tr>
                <th>日期</th>
                <th>星期</th>
                <th>人員/活動</th>
                <th>事由</th>
            </tr>
        </thead>
        <tbody id="calendarBody"></tbody>
    </table>

    <script>
        // 【請在這裡貼上您的 CSV 連結】
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';

        let leaveRecords = [];
        let currentDisplayDate = new Date();

        async function fetchData() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').slice(1); // 跳過標題
                leaveRecords = rows.filter(row => row.trim() !== "").map(row => {
                    const cols = row.split(',');
                    return { name: cols[0], type: cols[1], start: cols[2], end: cols[3], note: cols[5] };
                });
                renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1);
            } catch (e) { console.error("讀取失敗", e); }
        }

        function renderCalendar(year, month) {
            const tbody = document.getElementById('calendarBody');
            tbody.innerHTML = '';
            document.getElementById('monthLabel').innerText = `${year}年 ${month}月`;
            
            const daysInMonth = new Date(year, month, 0).getDate();
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const records = leaveRecords.filter(r => r.start <= dateStr && dateStr <= r.end);
                
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${dateStr}</td><td>${new Date(dateStr).toLocaleDateString('zh-TW', {weekday: 'short'})}</td>
                                <td>${records.map(r => r.name).join('<br>')}</td><td>${records.map(r => r.note).join('<br>')}</td>`;
                tbody.appendChild(tr);
            }
        }

        function changeMonth(delta) {
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + delta);
            renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1);
        }

        fetchData();
    </script>
</body>
</html>
