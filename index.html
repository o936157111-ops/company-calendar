<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>金牛頓公司行事曆</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f8f9fa; max-width: 1200px; margin: 0 auto; line-height: 1.6; }
        h2 { color: #0d47a1; border-bottom: 3px solid #e0e0e0; padding-bottom: 5px; margin-top: 5px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background-color: white; margin-bottom: 20px; table-layout: fixed; }
        th, td { border: 1px solid #dee2e6; padding: 5px; text-align: center; height: 110px; vertical-align: top; }
        th { background-color: #e3f2fd; color: #0d47a1; height: auto; }
        
        .date-number { font-weight: bold; text-align: center; margin-bottom: 5px; }
        .leave-record { padding: 2px 4px; margin-top: 2px; border-radius: 3px; font-size: 0.8em; text-align: left; border-left: 4px solid #777; background: #eee; color: #333 !important; word-break: break-all; }
        .activity-record { background-color: #673ab7 !important; color: #fff !important; border-left-color: #fff !important; }
        .holiday-record { background-color: #e91e63 !important; color: #fff !important; border-left-color: #fff !important; }
        
        .today-highlight { background-color: #b71c1c !important; color: white !important; }
        .today-highlight .date-number { color: white !important; }
        .today-highlight .leave-record { background: #fff !important; color: #000 !important; border-left-color: #333 !important; }
        
        .public-holiday { background-color: #fff3e0 !important; }
        .holiday-label { font-size: 0.75em; color: #d84315; font-weight: bold; margin-top: 2px; }
        
        .hide-weekend .col-6, .hide-weekend .col-0 { display: none; }
        
        #calendarHeader { background-color: #0d47a1; color: white; padding: 15px; font-size: 1.2em; font-weight: bold; display: flex; align-items: center; justify-content: space-between; }
        #currentYearMonth { flex: 1; text-align: center; }
        .btn-group { display: flex; gap: 10px; }
        button { background-color: #fff; color: #0d47a1; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background-color: #e3f2fd; }

        /* 查詢區塊樣式 */
        #querySection { background: white; padding: 20px; border: 1px solid #dee2e6; margin-top: 20px; border-radius: 8px; }
        #resultTable { width: 100%; border-collapse: collapse; margin-top: 15px; table-layout: auto; }
        #resultTable th, #resultTable td { height: auto; padding: 8px; border: 1px solid #dee2e6; }
    </style>
</head>
<body>

    <h2>📊 金牛頓公司行事曆</h2>

    <div id="calendarContainer">
        <div id="calendarHeader">
            <button onclick="changeMonth(-1)">◀ 上個月</button>
            <span id="currentYearMonth"></span>
            <div class="btn-group">
                <button onclick="toggleWeekend()">顯示/隱藏週末</button>
                <button onclick="changeMonth(1)">下個月 ▶</button>
            </div>
        </div>
        <table id="calendar">
            <thead>
                <tr id="calendarHead">
                    <th class="col-0">日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th class="col-6">六</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="querySection">
        <h3>🔍 紀錄查詢</h3>
        <select id="nameSelect"><option value="">選擇姓名</option></select>
        <input type="date" id="startDate"> 至 <input type="date" id="endDate">
        <button onclick="performQuery()">查詢</button>
        
        <table id="resultTable">
            <thead><tr><th>姓名</th><th>事別</th><th>開始日期</th><th>結束日期</th><th>時數/天數</th><th>說明</th></tr></thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        let leaveRecords = [];
        let currentDisplayDate = new Date();
        const publicHolidaysList = ["2026-01-01", "2026-02-17", "2026-02-28", "2026-04-04", "2026-04-05", "2026-05-01", "2026-10-10"];
        const holidayNames = {"2026-01-01": "元旦", "2026-02-17": "春節", "2026-02-28": "二二八", "2026-04-04": "兒童節", "2026-04-05": "清明節", "2026-05-01": "勞動節", "2026-10-10": "國慶日"};
        
        async function fetchGoogleData() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').slice(1);
                leaveRecords = rows.filter(r => r.trim()).map(r => {
                    const c = r.split(',');
                    return { name: c[0]?.trim(), type: c[1]?.trim(), start: c[2]?.trim(), end: c[3]?.trim(), duration: c[4]?.trim(), note: c[5]?.trim() };
                });
                
                // 初始化姓名下拉選單
                const names = [...new Set(leaveRecords.map(r => r.name))];
                const select = document.getElementById('nameSelect');
                names.forEach(n => { let o = document.createElement('option'); o.value = n; o.textContent = n; select.appendChild(o); });
                
                renderCalendar();
            } catch (err) { console.error("資料讀取失敗", err); }
        }

        function performQuery() {
            const name = document.getElementById('nameSelect').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = '';
            
            leaveRecords.filter(r => 
                (name === '' || r.name === name) &&
                (start === '' || r.start >= start) &&
                (end === '' || r.end <= end)
            ).forEach(r => {
                tbody.innerHTML += `<tr><td>${r.name}</td><td>${r.type}</td><td>${r.start}</td><td>${r.end}</td><td>${r.duration}</td><td>${r.note}</td></tr>`;
            });
        }

        function toggleWeekend() { document.getElementById('calendar').classList.toggle('hide-weekend'); }

        function renderCalendar() {
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth() + 1;
            document.getElementById('currentYearMonth').textContent = `${year}年 ${month}月`;
            const tbody = document.querySelector('#calendar tbody');
            tbody.innerHTML = '';
            const firstDay = new Date(year, month - 1, 1).getDay();
            const lastDate = new Date(year, month, 0).getDate();
            let date = 1;

            for (let i = 0; i < 6; i++) {
                let row = document.createElement('tr');
                for (let j = 0; j < 7; j++) {
                    let cell = document.createElement('td');
                    cell.className = `col-${j}`;
                    if ((i === 0 && j < firstDay) || date > lastDate) { cell.classList.add('other-month'); } 
                    else {
                        const ds = `${year}-${String(month).padStart(2,'0')}-${String(date).padStart(2,'0')}`;
                        if (ds === new Date().toISOString().slice(0,10)) cell.classList.add('today-highlight');
                        else if (publicHolidaysList.includes(ds)) cell.classList.add('public-holiday');
                        cell.innerHTML = `<div class="date-number">${date}</div>`;
                        if (holidayNames[ds]) cell.innerHTML += `<div class="holiday-label">${holidayNames[ds]}</div>`;
                        leaveRecords.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                            cell.innerHTML += `<div class="leave-record">${r.name}-${r.note}</div>`;
                        });
                        date++;
                    }
                    row.appendChild(cell);
                }
                tbody.appendChild(row);
                if (date > lastDate) break;
            }
        }
        function changeMonth(d) { currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); renderCalendar(); }
        fetchGoogleData();
    </script>
</body>
</html>
