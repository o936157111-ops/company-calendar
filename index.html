<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金牛頓公司行事曆</title>
    <style>
        /* 強制設定基礎字體與寬度 */
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f8f9fa; margin: 0; font-size: 16px; }
        h2 { color: #0d47a1; margin: 20px 0; font-size: 2em; text-align: center; }
        
        #calendarContainer { 
            border: 2px solid #0d47a1; background: white; border-radius: 8px; overflow: hidden; 
            width: 95%; max-width: 1400px; margin: 0 auto; 
        }
        
        #calendarHeader { background-color: #0d47a1; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background-color: #e3f2fd; padding: 15px; text-align: center; font-size: 1.2em; color: #1565c0; }
        
        /* 格子高度增加，確保字體放大後不會擠壓 */
        td { 
            border: 1px solid #dee2e6; height: 160px; vertical-align: top; padding: 10px; 
            font-size: 1em; 
        }
    </style>
</head>
<body>

    <h2>金牛頓公司行事曆</h2>
    
    <div id="calendarContainer">
        <div id="calendarHeader">
            <button onclick="changeMonth(-1)" style="padding: 10px 20px;">◀ 上個月</button>
            <span id="currentYearMonth" style="font-weight:bold; font-size: 1.2em;"></span>
            <button onclick="changeMonth(1)" style="padding: 10px 20px;">下個月 ▶</button>
        </div>
        <table id="calendar">
            <thead>
                <tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        let leaveRecords = [];
        let currentDisplayDate = new Date();

        async function fetchData() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').slice(1);
                leaveRecords = rows.filter(row => row.trim() !== "").map(row => {
                    const [name, type, start, end, dur, note] = row.split(',');
                    return { name: name?.trim(), type: type?.trim(), start: start?.trim(), end: end?.trim(), note: note?.trim() };
                });
                renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1);
            } catch (e) { console.error("資料讀取失敗", e); }
        }

        function renderCalendar(year, month) {
            document.getElementById('currentYearMonth').textContent = `${year}年 ${month}月`;
            const tbody = document.querySelector('#calendar tbody');
            tbody.innerHTML = '';
            
            let firstDay = new Date(year, month - 1, 1).getDay();
            let lastDate = new Date(year, month, 0).getDate();
            let row = document.createElement('tr');
            
            for(let i=0; i<firstDay; i++) row.appendChild(document.createElement('td'));
            
            for(let d=1; d<=lastDate; d++) {
                if((firstDay + d - 1) % 7 === 0) { tbody.appendChild(row); row = document.createElement('tr'); }
                let cell = document.createElement('td');
                const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                cell.innerHTML = `<strong>${d}</strong>`;
                
                leaveRecords.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                    // [絕對優先顏色設定] 直接內嵌 style
                    let bg = "#eee", color = "#333", border = "#999";
                    if (r.type && r.type.includes('金牛頓')) {
                        bg = "#0d47a1"; color = "#ffffff"; border = "#002171";
                    } else if (r.type === '出差') {
                        bg = "#bbdefb"; color = "#0d47a1"; border = "#1976d2";
                    }
                    
                    const displayText = r.note ? `${r.name}:${r.note}` : r.name;
                    cell.innerHTML += `<div style="background-color:${bg}; color:${color}; border-left:5px solid ${border}; padding:4px 8px; margin-top:5px; font-size:0.95em; border-radius:4px; word-wrap:break-word;">${displayText}</div>`;
                });
                row.appendChild(cell);
            }
            tbody.appendChild(row);
        }

        function changeMonth(d) { 
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); 
            renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1); 
        }

        fetchData();
    </script>
</body>
</html>
