<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>金牛頓公司行事曆</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f8f9fa; max-width: 1200px; margin: 0 auto; line-height: 1.6; }
        h2 { color: #0d47a1; border-bottom: 3px solid #e0e0e0; padding-bottom: 5px; margin-top: 5px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background-color: white; margin-bottom: 20px; table-layout: fixed; }
        th, td { border: 1px solid #dee2e6; padding: 5px; text-align: center; height: 110px; vertical-align: top; }
        th { background-color: #e3f2fd; color: #0d47a1; height: auto; }
        
        /* 查詢區塊固定樣式：防止跳動 */
        #querySection { background: white; padding: 20px; border: 1px solid #dee2e6; margin-top: 20px; border-radius: 8px; }
        #queryControls { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; }
        #nameSelect, #startDate, #endDate { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 150px; }
        
        #summaryArea { padding: 15px; background: #e3f2fd; border-radius: 4px; font-weight: bold; color: #0d47a1; min-height: 20px; }
        #resultTable { width: 100%; border-collapse: collapse; margin-top: 15px; table-layout: auto; }
        #resultTable th, #resultTable td { height: auto; padding: 10px; border: 1px solid #dee2e6; text-align: center; }
        
        /* 其他既有樣式 */
        .date-number { font-weight: bold; text-align: center; margin-bottom: 5px; }
        .leave-record { padding: 2px 4px; margin-top: 2px; border-radius: 3px; font-size: 0.8em; text-align: left; border-left: 4px solid #777; background: #eee; color: #333 !important; }
        .today-highlight { background-color: #b71c1c !important; color: white !important; }
    </style>
</head>
<body>

    <h2>📊 金牛頓公司行事曆</h2>
    <div id="calendarHeader" style="background:#0d47a1; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;">
        <button onclick="changeMonth(-1)">◀ 上個月</button>
        <span id="currentYearMonth"></span>
        <button onclick="changeMonth(1)">下個月 ▶</button>
    </div>
    <table id="calendar"><thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead><tbody></tbody></table>

    <div id="querySection">
        <h3>🔍 紀錄查詢</h3>
        <div id="queryControls">
            <select id="nameSelect"><option value="ALL">全部人員</option></select>
            <input type="date" id="startDate"> 至 <input type="date" id="endDate">
            <button onclick="performQuery()">查詢</button>
        </div>
        <div id="summaryArea">統計摘要: <span id="summaryText">請點擊查詢</span></div>
        <table id="resultTable">
            <thead><tr><th>姓名</th><th>事別</th><th>開始日期</th><th>結束日期</th><th>時數/天數</th><th>說明</th></tr></thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        let leaveRecords = [];
        let currentDisplayDate = new Date();

        async function fetchGoogleData() {
            const response = await fetch(CSV_URL);
            const text = await response.text();
            const rows = text.split('\n').slice(1);
            leaveRecords = rows.filter(r => r.trim()).map(r => {
                const c = r.split(',');
                // 這裡我們把整行印出來看，確保資料真的有讀到
                console.log("Raw Row:", c);
                return { name: c[0]?.trim(), type: c[1]?.trim(), start: c[2]?.trim(), end: c[3]?.trim(), duration: c[4]?.trim(), note: c[5]?.trim() };
            });
            const names = [...new Set(leaveRecords.map(r => r.name))];
            const select = document.getElementById('nameSelect');
            names.forEach(n => { if(n) select.innerHTML += `<option value="${n}">${n}</option>`; });
            renderCalendar();
        }

        function performQuery() {
            const name = document.getElementById('nameSelect').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = '';
            
            const filtered = leaveRecords.filter(r => 
                (name === 'ALL' || r.name === name) &&
                (start === '' || r.start >= start) &&
                (end === '' || r.end <= end)
            );

            const stats = {};
            filtered.forEach(r => {
                // 這裡強制解析：如果你的 CSV 欄位裡有奇怪字元，現在會被過濾
                const rawVal = r.duration || "0";
                const val = parseFloat(rawVal) || 0;
                stats[r.type] = (stats[r.type] || 0) + val;
                
                tbody.innerHTML += `<tr><td>${r.name}</td><td>${r.type}</td><td>${r.start}</td><td>${r.end}</td><td>${rawVal}</td><td>${r.note}</td></tr>`;
            });

            const summaryArr = Object.entries(stats).map(([type, total]) => `${type}: ${total.toFixed(2)}天`);
            document.getElementById('summaryText').textContent = summaryArr.length > 0 ? summaryArr.join(' | ') : '無符合紀錄';
        }

        function renderCalendar() { /* ...維持原樣... */ }
        function changeMonth(d) { currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); renderCalendar(); }
        fetchGoogleData();
    </script>
</body>
</html>
