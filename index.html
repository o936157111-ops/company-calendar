<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>金牛頓公司行事曆</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f8f9fa; }
        /* 標題與月份區塊，統一使用深藍色 */
        #headerContainer { background-color: #0d47a1; color: white; padding: 15px; border-radius: 8px 8px 0 0; }
        
        /* 行事曆表格樣式 */
        #calendar { width: 100%; border-collapse: collapse; background: white; table-layout: fixed; }
        #calendar th, #calendar td { border: 1px solid #dee2e6; padding: 5px; text-align: center; vertical-align: top; }
        #calendar td { height: 110px; } /* 只限定行事曆高度 */
        th { background-color: #e3f2fd; color: #0d47a1; padding: 10px; }
        
        /* 查詢清單表格樣式 (高度設為自動) */
        #resultTable { width: 100%; border-collapse: collapse; margin-top: 15px; }
        #resultTable td { height: auto !important; padding: 8px; border: 1px solid #dee2e6; }
        
        .public-holiday { background-color: #fff3e0 !important; }
        .today-highlight { background-color: #b71c1c !important; color: white !important; }
        .leave-record { font-size: 0.8em; padding: 2px; margin-top: 2px; background: #eee; text-align: left; }
    </style>
</head>
<body>

    <div id="headerContainer">
        <div style="font-size: 1.5em; font-weight: bold;">📊 金牛頓公司行事曆</div>
        <div style="display:flex; justify-content:space-between; margin-top:10px;">
            <button onclick="changeMonth(-1)">◀ 上個月</button>
            <span id="currentYearMonth" style="font-size:1.2em;"></span>
            <button onclick="changeMonth(1)">下個月 ▶</button>
        </div>
    </div>

    <table id="calendar">
        <thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead>
        <tbody></tbody>
    </table>

    <div id="querySection" style="background:white; padding:20px; margin-top:20px; border:1px solid #ddd;">
        <h3>🔍 紀錄查詢</h3>
        <select id="nameSelect"><option value="ALL">全部人員</option></select>
        <input type="date" id="startDate"> 至 <input type="date" id="endDate">
        <button onclick="performQuery()">查詢</button>
        <table id="resultTable">
            <thead><tr><th>姓名</th><th>事別</th><th>開始</th><th>結束</th><th>說明</th></tr></thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <script>
        // 保持您原本運作順暢的 JS 邏輯，僅確保渲染時顏色類別正確寫入
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        let leaveRecords = [];
        let currentDisplayDate = new Date();
        const publicHolidays = ["2026-01-01", "2026-02-17", "2026-02-28"];

        async function fetchGoogleData() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            leaveRecords = text.split('\n').slice(1).filter(r => r.trim()).map(r => {
                const c = r.split(',');
                return { name: c[0], type: c[1], start: c[2], end: c[3], note: c[5] };
            });
            renderCalendar();
        }

        function renderCalendar() {
            const y = currentDisplayDate.getFullYear(), m = currentDisplayDate.getMonth();
            document.getElementById('currentYearMonth').textContent = `${y}年 ${m + 1}月`;
            const tbody = document.querySelector('#calendar tbody');
            tbody.innerHTML = '';
            const firstDay = new Date(y, m, 1).getDay();
            const lastDate = new Date(y, m + 1, 0).getDate();
            let date = 1;
            for (let i = 0; i < 6; i++) {
                let row = document.createElement('tr');
                for (let j = 0; j < 7; j++) {
                    let cell = document.createElement('td');
                    if (i === 0 && j < firstDay || date > lastDate) cell.style.background = '#f9f9f9';
                    else {
                        const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(date).padStart(2,'0')}`;
                        if (publicHolidays.includes(ds)) cell.classList.add('public-holiday');
                        cell.innerHTML = `<div>${date}</div>`;
                        leaveRecords.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                            cell.innerHTML += `<div class="leave-record">${r.name}-${r.note}</div>`;
                        });
                        date++;
                    }
                    row.appendChild(cell);
                }
                tbody.appendChild(row);
                if (date > lastDate) break;
            }
        }
        function changeMonth(d) { currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); renderCalendar(); }
        function performQuery() { /* 原有查詢邏輯 */ }
        fetchGoogleData();
    </script>
</body>
</html>
