<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>金牛頓公司活動行事曆</title>
    <style>
        /* (為了節省篇幅，此處省略，請務必將您原檔案中的所有 <style> 內容貼回此處) */
    </style>
</head>
<body>
    <script>
        // 設定 Google Sheet CSV 連結
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';

        // [將您的原始 JavaScript 變數與函式區塊放在這裡，例如：isAdmin, nameList, addLeaveRecord 等]
        // ... (保持您的原始功能代碼不動) ...

        // 核心修改：雲端同步資料函式
        async function loadDataFromGoogle() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').slice(1);
                
                // 將 Google 資料轉換為您原本使用的 leaveRecords 陣列結構
                leaveRecords = rows.filter(r => r.trim()).map(r => {
                    const c = r.split(',');
                    return { 
                        id: Math.random().toString(36).substr(2, 9), 
                        name: c[0]?.trim(), 
                        type: c[1]?.trim(), 
                        start: c[2]?.trim(), 
                        end: c[3]?.trim(), 
                        duration: parseFloat(c[4]) || 0,
                        displayDuration: c[4]?.trim(),
                        note: c[5]?.trim() 
                    };
                });
                
                // 讀取完成後，呼叫您原本的 UI 更新邏輯
                renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1);
                if (typeof renderSuggestions === 'function') renderSuggestions();
            } catch (err) {
                console.error("雲端同步失敗", err);
            }
        }

        // 修改初始化邏輯
        document.addEventListener('DOMContentLoaded', () => {
            // 執行雲端載入，取代原本的 localStorage 讀取
            loadDataFromGoogle();
            
            // 下面保留您原本的初始化邏輯 (例如選單渲染)
            const sel = document.getElementById('inputNameSelect');
            const qSel = document.getElementById('queryNameSelect');
            if (sel && qSel) {
                nameList.forEach(n => { sel.add(new Option(n, n)); qSel.add(new Option(n, n)); });
                sel.options[0].disabled = true;
                qSel.options[0].text = "全部人員";
                qSel.options[0].value = "全部人員";
            }
            if (typeof toggleLeaveTypeOptions === 'function') toggleLeaveTypeOptions();
        });
    </script>
</body>
</html>
