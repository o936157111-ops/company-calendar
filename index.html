<!DOCTYPE html>
<html lang="zh-TW"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>金牛頓公司活動行事曆</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f8f9fa; max-width: 1200px; margin: 0 auto; line-height: 1.6; }
        h2 { color: #0d47a1; border-bottom: 3px solid #e0e0e0; padding-bottom: 5px; margin-top: 5px; margin-bottom: 15px; }
        select, input[type="date"], input[type="text"], input[type="number"], textarea { height: 40px; padding: 8px 12px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; font-size: 14px; vertical-align: middle; }
        textarea { height: 80px; }
        table { width: 100%; border-collapse: collapse; background-color: white; margin-bottom: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: center; }
        th { background-color: #e3f2fd; color: #0d47a1; }
        #inputTable select, #inputTable input { width: 100%; }
        #calendarContainer { margin-top: 30px; border: 1px solid #0d47a1; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; background: white; }
        #calendarHeader { background-color: #0d47a1; color: white; padding: 15px; font-size: 1.5em; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #calendarHeader button { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 12px; cursor: pointer; border-radius: 4px; font-size: 0.6em; }
        #calendar td { height: 110px; vertical-align: top; width: 14.28%; }
        #calendar td:nth-child(1), #calendar th:nth-child(1) { color: #d32f2f; }
        #calendar td:nth-child(7), #calendar th:nth-child(7) { color: #1565c0; }
        .leave-record { padding: 3px 6px; margin-top: 3px; border-radius: 3px; font-size: 0.85em; text-align: left; border-left: 4px solid #999; background: #eee; word-break: break-all; }
        .activity-record { background-color: #673ab7 !important; color: white !important; }
        .holiday-record { background-color: #e91e63 !important; color: white !important; }
        .suggestion-display-box { background-color: #ffffff; border: 2px solid #ffb74d; border-radius: 8px; padding: 20px; margin-top: 30px; }
        .action-section { background: white; padding: 20px; border: 1px solid #ccc; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>📊 金牛頓公司活動行事曆</h2>
    <table id="inputTable">
        <thead><tr><th>人員</th><th>事別</th><th>開始日期</th><th>結束日期</th><th>說明/原因</th><th>操作</th></tr></thead>
        <tbody><tr>
            <td><select id="inputNameSelect"></select></td>
            <td><select id="inputLeaveType"><option value="活動">活動</option><option value="假期">假期</option></select></td>
            <td><input type="date" id="inputStartDate"></td>
            <td><input type="date" id="inputEndDate"></td>
            <td><input type="text" id="inputNote"></td>
            <td><button onclick="addLeaveRecord()" style="background:#4CAF50; color:white; border:none; padding:10px; cursor:pointer;">新增</button></td>
        </tr></tbody>
    </table>

    <div id="calendarContainer">
        <div id="calendarHeader">
            <button onclick="changeMonth(-1)">◀ 上個月</button>
            <span id="currentYearMonth"></span>
            <div><button onclick="changeMonth(1)">下個月 ▶</button></div>
        </div>
        <table id="calendar"><thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead><tbody></tbody></table>
    </div>

    <div class="action-section">
        <h3>🔍 查詢紀錄</h3>
        <div style="display:flex; gap:10px;">
            <select id="queryNameSelect"></select>
            <input type="date" id="queryStartDate"> 至 <input type="date" id="queryEndDate">
            <button onclick="queryRecords()">查詢</button>
        </div>
        <div id="queryResultArea"></div>
    </div>

    <script>
        const nameList = ["金牛頓", "ERIC", "JAMES", "方順黌", "王冠峯", "余品橋", "李佩娟", "高欣宜", "陳秀燕", "陳品鈞", "陳靖昂", "陳慧真", "曾晨杰", "楊添仰", "詹淑敏", "戴政宏", "蘇威丞"];
        let leaveRecords = [], currentDisplayDate = new Date();
        const GOOGLE_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';

        async function fetchGoogleData() {
            try {
                const res = await fetch(GOOGLE_CSV_URL);
                const data = await res.text();
                const rows = data.split('\n').slice(1);
                leaveRecords = rows.filter(r => r.trim() !== '').map((row, i) => {
                    const c = row.split(',');
                    return { id: i, name: c[0], type: c[1], start: c[2], end: c[3], note: c[4] || '' };
                });
                renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1);
            } catch (e) { console.error(e); }
        }

        function renderCalendar(y, m) {
            document.getElementById('currentYearMonth').textContent = `${y}年 ${m}月`;
            const tbody = document.querySelector('#calendar tbody'); tbody.innerHTML = '';
            const first = new Date(y, m - 1, 1).getDay(), last = new Date(y, m, 0).getDate();
            let d = 1;
            for (let i = 0; i < 6; i++) {
                let row = '<tr>';
                for (let j = 0; j < 7; j++) {
                    if ((i === 0 && j < first) || d > last) { row += '<td></td>'; }
                    else {
                        const ds = `${y}-${String(m).padStart(2,'0')}-${String(d++).padStart(2,'0')}`;
                        let cell = `<td><div style="font-size:12px; font-weight:bold;">${d-1}</div>`;
                        leaveRecords.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                            // 保持原本邏輯，確保活動是深藍 (activity-record)
                            let tc = r.type.includes('活動') ? 'activity-record' : 'holiday-record';
                            cell += `<div class="leave-record ${tc}">${r.name}-${r.note}</div>`;
                        });
                        row += cell + '</td>';
                    }
                }
                tbody.innerHTML += row + '</tr>';
                if (d > last) break;
            }
        }

        function queryRecords() {
            const s = document.getElementById('queryStartDate').value, e = document.getElementById('queryEndDate').value;
            let res = leaveRecords.filter(r => (r.start >= s && r.start <= e) || (r.end >= s && r.end <= e));
            // 這裡移除操作欄位
            let h = `<table><thead><tr><th>姓名</th><th>事別</th><th>開始日期</th><th>結束日期</th><th>說明/原因</th></tr></thead><tbody>`;
            res.forEach(r => h += `<tr><td>${r.name}</td><td>${r.type}</td><td>${r.start}</td><td>${r.end}</td><td>${r.note}</td></tr>`);
            document.getElementById('queryResultArea').innerHTML = h + '</tbody></table>';
        }

        // 保持其他原有功能...
        function changeMonth(d) { currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1); }
        function addLeaveRecord() {} // 保持您原有的完整定義
        
        document.addEventListener('DOMContentLoaded', () => {
            const sel = document.getElementById('inputNameSelect'), qSel = document.getElementById('queryNameSelect');
            nameList.forEach(n => { sel.add(new Option(n, n)); qSel.add(new Option(n, n)); });
            fetchGoogleData();
        });
    </script>
</body></html>
