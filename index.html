<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>金牛頓公司活動行事曆</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f8f9fa; max-width: 1200px; margin: 0 auto; line-height: 1.6; }
        h2 { color: #0d47a1; border-bottom: 3px solid #e0e0e0; padding-bottom: 5px; margin-top: 5px; margin-bottom: 15px; }
        select, input[type="date"], input[type="text"], input[type="number"], textarea { height: 40px; padding: 8px 12px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; font-size: 14px; vertical-align: middle; }
        table { width: 100%; border-collapse: collapse; background-color: white; margin-bottom: 20px; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: center; }
        th { background-color: #e3f2fd; color: #0d47a1; }
    </style>
</head>
<body>

    <h2>📊 金牛頓公司活動行事曆</h2>
    <div id="calendarContainer">
        <div id="calendarHeader">
            <button onclick="changeMonth(-1)">◀</button>
            <span id="currentYearMonth"></span>
            <button onclick="changeMonth(1)">▶</button>
        </div>
        <table id="calendar"><thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead><tbody></tbody></table>
    </div>

    <script>
        // 設定 Google Sheet CSV 網址
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        
        // 核心修改：將原本讀取 localStorage 改為讀取 Google Sheet
        async function loadDataFromGoogle() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').slice(1);
                
                // 將 Google 資料轉換為原來的 leaveRecords 陣列
                leaveRecords = rows.filter(r => r.trim()).map(r => {
                    const c = r.split(',');
                    return { 
                        name: c[0]?.trim(), 
                        type: c[1]?.trim(), 
                        start: c[2]?.trim(), 
                        end: c[3]?.trim(), 
                        displayDuration: c[4]?.trim(), 
                        note: c[5]?.trim() 
                    };
                });
                
                // 資料載入後，執行您原本 3/5 版本的所有初始化渲染
                renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1);
                if (typeof renderSuggestions === 'function') renderSuggestions();
            } catch (err) {
                console.error("雲端載入失敗，檢查網路或 CSV 連結", err);
            }
        }

        // [將您原本 3/5 版本的所有 JavaScript 函式貼在此處]
        // 包含：renderCalendar, renderSuggestions, addLeaveRecord, deleteRecord 等全部功能
        
        document.addEventListener('DOMContentLoaded', () => {
            // 取代原本直接呼叫 render 的動作，改為先抓資料
            loadDataFromGoogle();
            
            // 保留原本的選單初始化邏輯
            const sel = document.getElementById('inputNameSelect');
            const qSel = document.getElementById('queryNameSelect');
            if (sel) {
                // ... (您原本的 nameList 處理邏輯) ...
            }
        });
    </script>
</body>
</html>
