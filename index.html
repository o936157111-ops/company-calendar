<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>金牛頓公司行事曆</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f8f9fa; max-width: 1200px; margin: 0 auto; line-height: 1.6; }
        
        /* 統一標題與月份列：改為深藍色區塊 */
        .calendar-main-header {
            background-color: #0d47a1 !important;
            color: white !important;
            border-radius: 8px 8px 0 0;
            overflow: hidden;
        }
        
        .main-title { 
            padding: 15px 20px 5px 20px; 
            margin: 0; 
            font-size: 1.5em;
            font-weight: bold;
        }

        #calendarHeader { 
            padding: 10px 20px 15px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        
        #currentYearMonth { flex: 1; text-align: center; font-size: 1.2em; font-weight: bold; color: white; }
        
        /* 行事曆格位高度維持 (用於顯示紀錄) */
        #calendar { width: 100%; border-collapse: collapse; background-color: white; table-layout: fixed; }
        #calendar th, #calendar td { border: 1px solid #dee2e6; text-align: center; vertical-align: top; }
        #calendar td { height: 110px; padding: 5px; }
        #calendar th { background-color: #e3f2fd; color: #0d47a1; height: auto; padding: 10px 5px; }
        
        /* 【關鍵修正】查詢列表樣式：高度改為自動縮放，更加精簡 */
        #resultTable { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; }
        #resultTable th { background-color: #f1f3f5; color: #333; height: 35px; border: 1px solid #dee2e6; }
        #resultTable td { height: auto !important; padding: 6px 10px; border: 1px solid #dee2e6; text-align: center; line-height: 1.2; }
        #resultTable tr:hover { background-color: #f1f7ff; }

        /* 紀錄樣式 */
        .leave-record { padding: 2px 4px; margin-top: 2px; border-radius: 3px; font-size: 0.8em; text-align: left; border-left: 4px solid #777; background: #eee; color: #333 !important; }
        .activity-record { background-color: #673ab7 !important; color: #fff !important; border-left-color: #fff !important; }
        .holiday-record { background-color: #e91e63 !important; color: #fff !important; border-left-color: #fff !important; }
        
        .public-holiday { background-color: #fff3e0 !important; }
        .today-highlight { background-color: #b71c1c !important; color: white !important; }
        .other-month { background-color: #f9f9f9; }
        .hide-weekend .col-6, .hide-weekend .col-0 { display: none; }
        
        /* 查詢按鈕與控制項：修正寬度與高度 */
        button { background: white; color: #0d47a1; border: 1px solid #ccc; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .query-btn { background: linear-gradient(135deg, #0d47a1, #1976d2); color: white; border: none; padding: 10px 25px; border-radius: 6px; }

        #querySection { background: white; padding: 20px; border: 1px solid #dee2e6; margin-top: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .control-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        #nameSelect, #startDate, #endDate { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 160px; height: 38px; box-sizing: border-box; }
        
        #summaryArea { margin-bottom: 15px; padding: 12px; background: #e3f2fd; border-left: 5px solid #0d47a1; border-radius: 4px; font-weight: bold; color: #0d47a1; display: none; }
    </style>
</head>
<body>

    <div class="calendar-main-header">
        <div class="main-title">📊 金牛頓公司行事曆</div>
        <div id="calendarHeader">
            <button onclick="changeMonth(-1)">◀ 上個月</button>
            <span id="currentYearMonth">載入中...</span>
            <div class="btn-group">
                <button onclick="toggleWeekend()">顯示/隱藏週末</button>
                <button onclick="changeMonth(1)">下個月 ▶</button>
            </div>
        </div>
    </div>

    <table id="calendar">
        <thead>
            <tr id="calendarHead">
                <th class="col-0">日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th class="col-6">六</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="querySection">
        <h3>🔍 紀錄查詢統計</h3>
        <div class="control-group">
            <select id="nameSelect"><option value="ALL">全部人員</option></select>
            <input type="date" id="startDate"> 
            <span>至</span>
            <input type="date" id="endDate">
            <button class="query-btn" onclick="performQuery()">執行查詢</button>
        </div>

        <div id="summaryArea">
            📝 統計結果：<span id="summaryText"></span>
        </div>

        <table id="resultTable">
            <thead>
                <tr>
                    <th style="width:15%">姓名</th><th style="width:15%">事別</th><th style="width:15%">開始</th><th style="width:15%">結束</th><th style="width:15%">天數</th><th style="width:25%">說明</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        let leaveRecords = [];
        let currentDisplayDate = new Date();
        const publicHolidaysList = ["2026-01-01", "2026-02-14", "2026-02-15", "2026-02-16", "2026-02-17", "2026-02-18", "2026-02-19", "2026-02-20", "2026-02-21", "2026-02-22", "2026-02-27", "2026-02-28", "2026-03-01", "2026-04-03", "2026-04-04", "2026-04-05", "2026-04-06", "2026-05-01", "2026-05-02", "2026-05-03", "2026-06-19", "2026-06-20", "2026-06-21", "2026-09-25", "2026-09-26", "2026-09-27", "2026-09-28", "2026-10-09", "2026-10-10", "2026-10-11", "2026-10-24", "2026-10-25", "2026-10-26", "2026-12-25", "2026-12-26", "2026-12-27"];
        const holidayNames = {"2026-01-01": "元旦", "2026-02-17": "春節", "2026-02-28": "二二八", "2026-04-04": "兒童節", "2026-04-05": "清明節", "2026-05-01": "勞動節", "2026-10-10": "國慶日"};
        
        async function fetchGoogleData() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').slice(1);
                leaveRecords = rows.filter(r => r.trim()).map(r => {
                    const c = r.split(',');
                    return { name: c[0]?.trim(), type: c[1]?.trim(), start: c[2]?.trim(), end: c[3]?.trim(), duration: c[4]?.trim(), note: c[5]?.trim() };
                });
                const names = [...new Set(leaveRecords.map(r => r.name))];
                const select = document.getElementById('nameSelect');
                names.forEach(n => { if(n) { let o = document.createElement('option'); o.value = n; o.textContent = n; select.appendChild(o); } });
                renderCalendar();
            } catch (err) { console.error("資料讀取失敗", err); }
        }

        function performQuery() {
            const name = document.getElementById('nameSelect').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const tbody = document.getElementById('resultBody');
            const summaryArea = document.getElementById('summaryArea');
            const summaryText = document.getElementById('summaryText');
            
            tbody.innerHTML = '';
            const filtered = leaveRecords.filter(r => (name === 'ALL' || r.name === name) && (start === '' || r.start >= start) && (end === '' || r.end <= end));
            const stats = {};
            
            filtered.forEach(r => {
                let val = 0;
                if (r.duration && r.duration.includes('小時')) val = (parseFloat(r.duration) || 0) / 8;
                else if (r.duration && (r.duration.includes('全天') || r.duration === '1')) val = 1.0;
                else if (r.duration && (r.duration.includes('半天') || r.duration === '0.5')) val = 0.5;
                else val = Math.max(1, (new Date(r.end) - new Date(r.start)) / 86400000 + 1);

                stats[r.type] = (stats[r.type] || 0) + val;
                tbody.innerHTML += `<tr><td>${r.name}</td><td>${r.type}</td><td>${r.start}</td><td>${r.end}</td><td>${val.toFixed(2)}</td><td>${r.note}</td></tr>`;
            });

            const summaryArr = Object.entries(stats).map(([type, total]) => `${type}: ${total.toFixed(2)} 天`);
            if (summaryArr.length > 0) {
                summaryText.textContent = summaryArr.join(' | ');
                summaryArea.style.display = 'block';
            } else { summaryArea.style.display = 'none'; }
        }

        function toggleWeekend() { document.getElementById('calendar').classList.toggle('hide-weekend'); }

        function renderCalendar() {
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth() + 1;
            document.getElementById('currentYearMonth').textContent = `${year}年 ${month}月`;

            const tbody = document.querySelector('#calendar tbody');
            tbody.innerHTML = '';
            const firstDay = new Date(year, month - 1, 1).getDay();
            const lastDate = new Date(year, month, 0).getDate();
            let date = 1;
            const todayStr = new Date().toISOString().slice(0,10);

            for (let i = 0; i < 6; i++) {
                let row = document.createElement('tr');
                for (let j = 0; j < 7; j++) {
                    let cell = document.createElement('td');
                    cell.className = `col-${j}`;
                    if ((i === 0 && j < firstDay) || date > lastDate) { cell.classList.add('other-month'); } 
                    else {
                        const ds = `${year}-${String(month).padStart(2,'0')}-${String(date).padStart(2,'0')}`;
                        if (ds === todayStr) cell.classList.add('today-highlight');
                        else if (publicHolidaysList.includes(ds)) cell.classList.add('public-holiday');
                        cell.innerHTML = `<div class="date-number">${date}</div>`;
                        if (holidayNames[ds]) cell.innerHTML += `<div style="font-size:0.75em;color:#d84315;font-weight:bold;">${holidayNames[ds]}</div>`;
                        leaveRecords.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                            let tc = r.type === '活動' ? 'activity-record' : (r.type === '假期' ? 'holiday-record' : 'leave-record');
                            cell.innerHTML += `<div class="leave-record ${tc}">${r.name}-${r.note}</div>`;
                        });
                        date++;
                    }
                    row.appendChild(cell);
                }
                tbody.appendChild(row);
                if (date > lastDate) break;
            }
        }
        function changeMonth(d) { currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); renderCalendar(); }
        fetchGoogleData();
    </script>
</body>
</html>
