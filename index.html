<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金牛頓公司行事曆</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 10px; background-color: #f8f9fa; margin: 0; }
        #calendarContainer { width: 98%; max-width: 1400px; margin: 0 auto; background: white; border-radius: 8px; border: 2px solid #0d47a1; overflow: hidden; }
        
        /* 搜尋與統計區域 */
        #searchPanel { background-color: #e3f2fd; padding: 15px; border-bottom: 2px solid #0d47a1; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; align-items: center; }
        #statsSummary { font-weight: bold; color: #0d47a1; padding: 5px 0; border-top: 1px solid #bbdefb; }
        
        #calendarHeader { background-color: #0d47a1; color: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background-color: #e3f2fd; color: #1565c0; padding: 10px 0; text-align: center; }
        td { border: 1px solid #dee2e6; height: 120px; vertical-align: top; padding: 5px; font-size: 0.85em; }
        
        .leave-record { padding: 3px 6px; margin: 2px 0; border-radius: 3px; font-size: 0.9em; border-left: 5px solid #999; }
        .is-today { background-color: #fff9c4 !important; }
    </style>
</head>
<body>

<div id="calendarContainer">
    <div id="searchPanel">
        <div class="controls">
            <select id="nameSearch" onchange="updateView()">
                <option value="">所有人員</option>
            </select>
            <input type="date" id="startDate" onchange="updateView()"> 至 
            <input type="date" id="endDate" onchange="updateView()">
            <button onclick="clearSearch()">清除重設</button>
        </div>
        <div id="statsSummary">統計摘要：請稍候...</div>
    </div>

    <div id="calendarHeader">
        <button onclick="changeMonth(-1)">◀ 上個月</button>
        <span id="currentYearMonth" style="font-weight:bold;"></span>
        <button onclick="changeMonth(1)">下個月 ▶</button>
    </div>
    
    <table id="calendar">
        <thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
    let leaveRecords = [];
    let currentDisplayDate = new Date();

    async function fetchData() {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        leaveRecords = text.split('\n').slice(1).filter(r => r.trim()).map(r => {
            const c = r.split(',');
            return { name: c[0]?.trim(), type: c[1]?.trim(), start: c[2]?.trim(), end: c[3]?.trim(), duration: parseFloat(c[4]) || 0, note: c[5]?.trim() };
        });
        
        // 自動填充下拉選單
        const names = [...new Set(leaveRecords.map(r => r.name))].sort();
        const select = document.getElementById('nameSearch');
        names.forEach(n => {
            let opt = document.createElement('option');
            opt.value = n; opt.textContent = n;
            select.appendChild(opt);
        });
        updateView();
    }

    function updateView() {
        const nameKey = document.getElementById('nameSearch').value;
        const startKey = document.getElementById('startDate').value;
        const endKey = document.getElementById('endDate').value;
        
        const filtered = leaveRecords.filter(r => {
            return (nameKey === "" || r.name === nameKey) && 
                   (startKey ? r.end >= startKey : true) && 
                   (endKey ? r.start <= endKey : true);
        });

        const stats = {};
        filtered.forEach(r => { stats[r.type] = (stats[r.type] || 0) + r.duration; });
        document.getElementById('statsSummary').textContent = "統計摘要：" + 
            Object.entries(stats).map(([k, v]) => `${k}: ${v.toFixed(2)}天`).join(" | ");

        renderCalendar(filtered);
    }

    function renderCalendar(filteredData) {
        const year = currentDisplayDate.getFullYear(), month = currentDisplayDate.getMonth() + 1;
        document.getElementById('currentYearMonth').textContent = `${year}年 ${month}月`;
        const tbody = document.querySelector('#calendar tbody');
        tbody.innerHTML = '';
        
        let firstDay = new Date(year, month - 1, 1).getDay();
        let lastDate = new Date(year, month, 0).getDate();
        let row = document.createElement('tr');
        for(let i=0; i<firstDay; i++) row.appendChild(document.createElement('td'));
        
        for(let d=1; d<=lastDate; d++) {
            let dayOfWeek = (firstDay + d - 1) % 7;
            if(dayOfWeek === 0 && d > 1) { tbody.appendChild(row); row = document.createElement('tr'); }
            let cell = document.createElement('td');
            const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            if (ds === new Date().toISOString().split('T')[0]) cell.className = 'is-today';
            cell.innerHTML = `<strong>${d}</strong>`;
            
            filteredData.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                let style = "background-color: #eee; border-left: 5px solid #999;";
                if (r.type && r.type.includes('金牛頓')) style = "background-color: #0d47a1; color: #fff; border-left: 5px solid #002171;";
                cell.innerHTML += `<div class="leave-record" style="${style}">${r.name}<br>${r.note}</div>`;
            });
            row.appendChild(cell);
        }
        tbody.appendChild(row);
    }

    function changeMonth(d) { currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); updateView(); }
    function clearSearch() { 
        document.getElementById('nameSearch').value = ''; 
        document.getElementById('startDate').value = ''; 
        document.getElementById('endDate').value = ''; 
        updateView(); 
    }
    fetchData();
</script>
</body>
</html>
