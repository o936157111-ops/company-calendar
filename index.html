<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>金牛頓公司活動行事曆</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 10px; background-color: #f8f9fa; max-width: 1200px; margin: 0 auto; line-height: 1.5; }
        h2 { color: #0d47a1; border-bottom: 3px solid #e0e0e0; padding-bottom: 5px; margin-top: 5px; margin-bottom: 15px; font-size: 1.5em; }
        
        select, input[type="date"] { height: 35px; padding: 5px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; background-color: white; table-layout: fixed; }
        th, td { border: 1px solid #dee2e6; padding: 5px; text-align: center; font-size: 13px; }
        th { background-color: #e3f2fd; color: #0d47a1; }
        
        #calendarContainer { margin-top: 20px; border: 1px solid #0d47a1; border-radius: 8px; overflow: hidden; background: white; }
        #calendarHeader { background-color: #0d47a1; color: white; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; }
        #calendarHeader button { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-size: 0.85em; }
        #currentYearMonth { font-size: 1.1em; font-weight: bold; }
        
        /* 修正日期數字水平置中 */
        .date-cell { font-weight: bold; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 2px; margin-bottom: 4px; }
        
        #calendar td { height: 90px; vertical-align: top; }
        #calendar td:nth-child(1), #calendar th:nth-child(1) { color: #d32f2f; }
        #calendar td:nth-child(7), #calendar th:nth-child(7) { color: #1565c0; }

        .hide-weekend th:nth-child(1), .hide-weekend td:nth-child(1),
        .hide-weekend th:nth-child(7), .hide-weekend td:nth-child(7) { display: none; }

        .leave-record { padding: 2px 4px; margin-top: 2px; border-radius: 3px; font-size: 0.75em; text-align: left; border-left: 3px solid #999; background: #eee; word-break: break-all; }
        .activity-record { background-color: #673ab7 !important; color: white !important; }
        .golden-record { background-color: #0d47a1 !important; color: white !important; }
        .holiday-record { background-color: #e91e63 !important; color: white !important; }

        .suggestion-display-box { background-color: #ffffff; border: 2px solid #ffb74d; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .action-section { background: white; padding: 15px; border: 1px solid #ccc; border-radius: 8px; margin-top: 20px; }
        @media print { .action-section, #calendarHeader button { display: none !important; } }
    </style>
</head>
<body>

    <h2>📊 金牛頓公司活動行事曆</h2>

    <div id="calendarContainer" class="hide-weekend">
        <div id="calendarHeader">
            <div class="header-row">
                <button onclick="changeMonth(-1)">◀ 上個月</button>
                <span id="currentYearMonth"></span>
                <button onclick="changeMonth(1)">下個月 ▶</button>
            </div>
            <div class="header-row" style="justify-content: center; margin-top: 5px;">
                <button onclick="toggleWeekend()">隱藏/顯示週末</button>
            </div>
        </div>
        <table id="calendar"><thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead><tbody></tbody></table>
    </div>

    <div class="suggestion-display-box">
        <h3 style="margin-top:0; color: #e65100;">📋 公司活動建議內容</h3>
        <table id="suggestionTable">
            <thead><tr><th style="width:30%">項目</th><th>建議詳情</th></tr></thead>
            <tbody id="suggestionList"></tbody>
        </table>
    </div>

    <div class="action-section">
        <h3 style="margin-top:0;">🔍 紀錄查詢、備份與列印</h3>
        <div style="display:flex; align-items:center; gap:5px; flex-wrap:wrap;">
            <select id="queryNameSelect"></select>
            <input type="date" id="queryStartDate"> 至 <input type="date" id="queryEndDate">
            <button onclick="queryRecords()">查詢</button>
            <button onclick="exportToExcel()">匯出</button>
            <button onclick="saveFullHTML()">儲存</button>
            <button onclick="window.print()">列印</button>
        </div>
    </div>

    <div id="queryResultArea"></div>

    <script>
        let currentDisplayDate = new Date();
        const SUGGEST_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=1793548004&single=true&output=csv';
        const GOOGLE_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        const nameList = ["全部人員", "金牛頓", "ERIC", "JAMES", "方順黌", "王冠峯", "余品橋", "李佩娟", "高欣宜", "陳秀燕", "陳品鈞", "陳靖昂", "陳慧真", "曾晨杰", "楊添仰", "詹淑敏", "戴政宏", "蘇威丞"];

        let leaveRecords = [], suggestions = [];

        async function fetchData() {
            try {
                const [resL, resS] = await Promise.all([fetch(GOOGLE_CSV_URL), fetch(SUGGEST_CSV_URL)]);
                const dataL = await resL.text(), dataS = await resS.text();
                leaveRecords = dataL.split('\n').slice(1).filter(r => r.trim() !== '').map((row, index) => {
                    const c = row.split(',');
                    return { name: c[0], type: c[1], start: c[2], end: c[3], dur: c[4]||"整天", note: c[5]||'' };
                });
                suggestions = dataS.split('\n').slice(1).filter(r => r.trim() !== '').map(row => { const c = row.split(','); return { title: c[0], content: c[1] }; });
                renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1);
                renderSuggestions();
            } catch (e) { console.error(e); }
        }

        function renderCalendar(year, month) {
            document.getElementById('currentYearMonth').textContent = `${year}年 ${month}月`;
            const tbody = document.querySelector('#calendar tbody');
            tbody.innerHTML = '';
            const firstDay = new Date(year, month - 1, 1).getDay(), lastDate = new Date(year, month, 0).getDate();
            let date = 1, html = '';
            for (let i = 0; i < 6; i++) {
                let row = '<tr>';
                for (let j = 0; j < 7; j++) {
                    if ((i === 0 && j < firstDay) || date > lastDate) { row += '<td></td>'; } 
                    else {
                        const ds = `${year}-${String(month).padStart(2,'0')}-${String(date).padStart(2,'0')}`;
                        row += `<td><div class="date-cell">${date}</div>`;
                        leaveRecords.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                            let tc = (r.name==='金牛頓')?'golden-record':(r.type==='活動'?'activity-record':(r.type==='假期'?'holiday-record':'leave-record'));
                            row += `<div class="leave-record ${tc}">${r.name}-${r.note}</div>`;
                        });
                        row += `</td>`; date++;
                    }
                }
                html += row + '</tr>'; if (date > lastDate && i >= 4) break; 
            }
            tbody.innerHTML = html;
        }

        function renderSuggestions() { document.getElementById('suggestionList').innerHTML = suggestions.map(s => `<tr><td style="font-weight:bold;">${s.title}</td><td style="text-align:left;">${s.content}</td></tr>`).join(''); }
        function toggleWeekend() { document.getElementById('calendarContainer').classList.toggle('hide-weekend'); }
        function changeMonth(d) { currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1); }
        function queryRecords() { /* 原邏輯 */ }
        function exportToExcel() { /* 原邏輯 */ }
        function saveFullHTML() { const blob = new Blob([document.documentElement.outerHTML], {type: 'text/html'}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "行事曆.html"; a.click(); }
        document.addEventListener('DOMContentLoaded', () => { nameList.forEach(n => document.getElementById('queryNameSelect').add(new Option(n, n))); fetchData(); });
    </script>
</body>
</html>
