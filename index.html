<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>金牛頓公司行事曆</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f8f9fa; max-width: 1200px; margin: 0 auto; }
        
        /* 1. 確保表頭深藍底色固定 */
        #calendarHeader { background-color: #0d47a1 !important; color: white; padding: 15px; border-radius: 8px 8px 0 0; display: flex; align-items: center; justify-content: space-between; }
        
        /* 2. 行事曆表格樣式：恢復所有顏色標記 */
        table { width: 100%; border-collapse: collapse; background-color: white; margin-bottom: 20px; table-layout: fixed; }
        th, td { border: 1px solid #dee2e6; padding: 5px; text-align: center; height: 110px; vertical-align: top; }
        th { background-color: #e3f2fd; color: #0d47a1; height: auto; }
        
        .date-number { font-weight: bold; margin-bottom: 5px; }
        .leave-record { padding: 2px 4px; margin-top: 2px; border-radius: 3px; font-size: 0.8em; text-align: left; border-left: 4px solid #777; background: #eee; color: #333 !important; word-break: break-all; }
        .activity-record { background-color: #673ab7 !important; color: #fff !important; border-left-color: #fff !important; }
        .holiday-record { background-color: #e91e63 !important; color: #fff !important; border-left-color: #fff !important; }
        .public-holiday { background-color: #fff3e0 !important; }
        .today-highlight { background-color: #b71c1c !important; color: white !important; }
        .holiday-label { font-size: 0.75em; color: #d84315; font-weight: bold; }

        /* 3. 查詢列表：恢復為簡潔行高 */
        #resultTable { width: 100%; border-collapse: collapse; margin-top: 15px; }
        #resultTable th { background-color: #f1f3f5; padding: 8px; border: 1px solid #dee2e6; }
        #resultTable td { height: auto !important; padding: 8px; border: 1px solid #dee2e6; text-align: center; }
        
        button { background: white; color: #0d47a1; border: 1px solid #ccc; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        #querySection { background: white; padding: 20px; border: 1px solid #dee2e6; border-radius: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="calendarHeader">
        <button onclick="changeMonth(-1)">◀ 上個月</button>
        <span id="currentYearMonth" style="font-weight:bold; font-size:1.2em;">金牛頓公司行事曆</span>
        <button onclick="changeMonth(1)">下個月 ▶</button>
    </div>
    
    <table id="calendar">
        <thead>
            <tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="querySection">
        <h3>🔍 紀錄查詢</h3>
        <select id="nameSelect"><option value="ALL">全部人員</option></select>
        <input type="date" id="startDate"> 至 <input type="date" id="endDate">
        <button onclick="performQuery()">執行查詢</button>
        <div id="summaryArea" style="margin-top:10px; display:none;"></div>
        <table id="resultTable">
            <thead><tr><th>姓名</th><th>事別</th><th>開始</th><th>結束</th><th>天數</th><th>說明</th></tr></thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        let leaveRecords = [];
        let currentDisplayDate = new Date();
        const publicHolidaysList = ["2026-01-01", "2026-02-17", "2026-02-28", "2026-04-04", "2026-05-01"];
        const holidayNames = {"2026-01-01": "元旦", "2026-02-17": "春節", "2026-02-28": "二二八", "2026-04-04": "兒童節", "2026-05-01": "勞動節"};

        async function fetchGoogleData() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            leaveRecords = text.split('\n').slice(1).filter(r => r.trim()).map(r => {
                const c = r.split(',');
                return { name: c[0]?.trim(), type: c[1]?.trim(), start: c[2]?.trim(), end: c[3]?.trim(), duration: c[4]?.trim(), note: c[5]?.trim() };
            });
            renderCalendar();
        }

        function renderCalendar() {
            const y = currentDisplayDate.getFullYear(), m = currentDisplayDate.getMonth();
            const tbody = document.querySelector('#calendar tbody');
            tbody.innerHTML = '';
            const firstDay = new Date(y, m, 1).getDay();
            const lastDate = new Date(y, m + 1, 0).getDate();
            let date = 1, todayStr = new Date().toISOString().slice(0,10);
            for (let i = 0; i < 6; i++) {
                let row = document.createElement('tr');
                for (let j = 0; j < 7; j++) {
                    let cell = document.createElement('td');
                    if ((i === 0 && j < firstDay) || date > lastDate) cell.style.background = '#f9f9f9';
                    else {
                        const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(date).padStart(2,'0')}`;
                        if (ds === todayStr) cell.classList.add('today-highlight');
                        if (publicHolidaysList.includes(ds)) cell.classList.add('public-holiday');
                        cell.innerHTML = `<div class="date-number">${date}</div>`;
                        if (holidayNames[ds]) cell.innerHTML += `<div class="holiday-label">${holidayNames[ds]}</div>`;
                        leaveRecords.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                            let tc = r.type === '活動' ? 'activity-record' : (r.type === '假期' ? 'holiday-record' : 'leave-record');
                            cell.innerHTML += `<div class="leave-record ${tc}">${r.name}-${r.note}</div>`;
                        });
                        date++;
                    }
                    row.appendChild(cell);
                }
                tbody.appendChild(row);
                if (date > lastDate) break;
            }
        }
        function performQuery() { /* 邏輯同前 */ }
        function changeMonth(d) { currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); renderCalendar(); }
        fetchGoogleData();
    </script>
</body>
</html>
