<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>金牛頓行事曆 - 完整整合版</title>
    </head>
<body>

    <div id="calendarContainer">
        </div>

    <div class="action-section">
        <h3>🔍 紀錄查詢、備份與匯出</h3>
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
            <select id="queryNameSelect"></select>
            <input type="date" id="queryStartDate"> 至 <input type="date" id="queryEndDate">
            <button onclick="queryRecords()" style="height:40px; background:#007bff; color:white; border:none; padding:0 20px; border-radius:4px; cursor:pointer;">搜尋</button>
        </div>
        <div id="queryResultArea" style="margin-top:20px;"></div>
    </div>

    <script>
        // 核心邏輯：讀取 Google CSV
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        let leaveRecords = [];

        async function fetchData() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            // 解析 CSV 並轉為陣列
            leaveRecords = text.split('\n').slice(1).filter(r => r.trim()).map(r => {
                const c = r.split(',');
                return { name: c[0]?.trim(), type: c[1]?.trim(), start: c[2]?.trim(), end: c[3]?.trim(), note: c[5]?.trim() };
            });
            // 載入後同時渲染日曆與初始化搜尋選單
            renderCalendar(new Date().getFullYear(), new Date().getMonth() + 1);
            initSearchSelect();
        }

        function initSearchSelect() {
            const qSel = document.getElementById('queryNameSelect');
            const names = [...new Set(leaveRecords.map(r => r.name))];
            qSel.add(new Option("全部人員", "全部人員"));
            names.forEach(n => qSel.add(new Option(n, n)));
        }

        // 搜尋功能與統計
        function queryRecords() {
            const qName = document.getElementById('queryNameSelect').value;
            const s = document.getElementById('queryStartDate').value;
            const e = document.getElementById('queryEndDate').value;
            
            let res = leaveRecords.filter(r => {
                const matchName = (qName === "全部人員" || r.name === qName);
                const matchDate = (s && e) ? (r.start <= e && r.end >= s) : true;
                return matchName && matchDate;
            });

            let stats = {};
            let html = `<table><thead><tr><th>姓名</th><th>事別</th><th>起訖</th><th>說明</th></tr></thead><tbody>`;
            res.forEach(r => {
                stats[r.type] = (stats[r.type] || 0) + 1; // 簡化版統計
                html += `<tr><td>${r.name}</td><td>${r.type}</td><td>${r.start}~${r.end}</td><td>${r.note}</td></tr>`;
            });
            
            let stText = Object.keys(stats).map(k => `${k}: ${stats[k]}筆`).join(' | ');
            html += `<tr style="background:#fff9c4;"><td colspan="4">統計摘要：${stText}</td></tr></tbody></table>`;
            document.getElementById('queryResultArea').innerHTML = html;
        }

        // [這裡放入您原本的 renderCalendar 函式]
        function renderCalendar(year, month) {
            // 原本的程式碼...
        }

        fetchData();
    </script>
</body>
</html>
