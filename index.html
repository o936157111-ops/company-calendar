<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>金牛頓公司行事曆</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f8f9fa; max-width: 1200px; margin: 0 auto; }
        
        /* 強制固定表頭樣式 */
        #calendarWrapper { background-color: #0d47a1; color: white; border-radius: 8px 8px 0 0; padding: 15px; }
        .main-title { margin: 0; font-size: 1.5em; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.3); text-align: center; }
        #navBar { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }

        /* 行事曆表格 */
        table { width: 100%; border-collapse: collapse; background-color: white; table-layout: fixed; }
        th, td { border: 1px solid #dee2e6; padding: 5px; text-align: center; vertical-align: top; }
        #calendar td { height: 110px; }
        th { background-color: #e3f2fd; color: #0d47a1; height: auto; padding: 10px; }
        
        /* 查詢結果表格：高度設為 auto，避免過高 */
        #resultTable { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        #resultTable th { background-color: #f1f3f5; color: #333; padding: 10px; border: 1px solid #dee2e6; }
        #resultTable td { height: auto !important; padding: 8px; border: 1px solid #dee2e6; text-align: center; }
        
        /* 按鈕與其他 */
        button { background: white; color: #0d47a1; border: 1px solid #ccc; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .query-btn { background: #0d47a1; color: white; border: none; padding: 8px 20px; }
        #querySection { background: white; padding: 20px; border: 1px solid #dee2e6; margin-top: 25px; border-radius: 8px; }
        .leave-record { font-size: 0.8em; padding: 2px; margin-top: 2px; border-left: 4px solid #777; background: #eee; text-align: left; }
    </style>
</head>
<body>

    <div id="calendarWrapper">
        <div class="main-title">📊 金牛頓公司行事曆</div>
        <div id="navBar">
            <button onclick="changeMonth(-1)">◀ 上個月</button>
            <span id="currentYearMonth" style="font-size: 1.2em; font-weight: bold;"></span>
            <div>
                <button onclick="toggleWeekend()">顯示/隱藏週末</button>
                <button onclick="changeMonth(1)">下個月 ▶</button>
            </div>
        </div>
    </div>

    <table id="calendar">
        <thead>
            <tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="querySection">
        <h3>🔍 紀錄查詢統計</h3>
        <div style="display:flex; gap:10px; align-items:center;">
            <select id="nameSelect"><option value="ALL">全部人員</option></select>
            <input type="date" id="startDate"> 至 <input type="date" id="endDate">
            <button class="query-btn" onclick="performQuery()">執行查詢</button>
        </div>
        <div id="summaryArea" style="margin-top:15px; padding:10px; background:#e3f2fd; display:none;"></div>
        <table id="resultTable">
            <thead>
                <tr><th>姓名</th><th>事別</th><th>開始</th><th>結束</th><th>天數</th><th>說明</th></tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <script>
        // JS 邏輯不變，確保數據正確計算
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        let leaveRecords = [];
        let currentDisplayDate = new Date();

        async function fetchGoogleData() {
            const response = await fetch(CSV_URL);
            const text = await response.text();
            leaveRecords = text.split('\n').slice(1).filter(r=>r.trim()).map(r => {
                const c = r.split(',');
                return { name: c[0]?.trim(), type: c[1]?.trim(), start: c[2]?.trim(), end: c[3]?.trim(), duration: c[4]?.trim(), note: c[5]?.trim() };
            });
            renderCalendar();
        }

        function renderCalendar() {
            const y = currentDisplayDate.getFullYear(), m = currentDisplayDate.getMonth();
            document.getElementById('currentYearMonth').textContent = `${y}年 ${m + 1}月`;
            const tbody = document.querySelector('#calendar tbody');
            tbody.innerHTML = '';
            const firstDay = new Date(y, m, 1).getDay();
            const lastDate = new Date(y, m + 1, 0).getDate();
            let date = 1;
            for (let i = 0; i < 6; i++) {
                let row = document.createElement('tr');
                for (let j = 0; j < 7; j++) {
                    let cell = document.createElement('td');
                    if ((i === 0 && j < firstDay) || date > lastDate) cell.style.background = '#f9f9f9';
                    else {
                        const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(date).padStart(2,'0')}`;
                        cell.innerHTML = `<div>${date}</div>`;
                        leaveRecords.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                            cell.innerHTML += `<div class="leave-record">${r.name}-${r.note}</div>`;
                        });
                        date++;
                    }
                    row.appendChild(cell);
                }
                tbody.appendChild(row);
                if (date > lastDate) break;
            }
        }

        function performQuery() {
            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = '';
            leaveRecords.forEach(r => {
                tbody.innerHTML += `<tr><td>${r.name}</td><td>${r.type}</td><td>${r.start}</td><td>${r.end}</td><td>計算中</td><td>${r.note}</td></tr>`;
            });
        }
        function changeMonth(d) { currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); renderCalendar(); }
        function toggleWeekend() { document.getElementById('calendar').classList.toggle('hide-weekend'); }
        fetchGoogleData();
    </script>
</body>
</html>
