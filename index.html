<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金牛頓公司行事曆</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background-color: #f8f9fa; margin: 0; }
        h2 { color: #0d47a1; margin: 15px 0; font-size: 1.8em; text-align: center; }
        
        #calendarContainer { border: 2px solid #0d47a1; background: white; border-radius: 8px; overflow: hidden; max-width: 1200px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #calendarHeader { background-color: #0d47a1; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background-color: #e3f2fd; padding: 12px; text-align: center; font-size: 1.1em; color: #1565c0; }
        
        td { 
            border: 1px solid #dee2e6; 
            height: 150px; 
            vertical-align: top; 
            padding: 8px; 
            font-size: 1em; 
            overflow-y: auto; 
        }
        
        /* 顏色識別系統：確保設定了顏色類別 */
        .leave-record { 
            padding: 4px 6px; 
            margin-top: 4px; 
            font-size: 0.9em; 
            text-align: left; 
            border-radius: 4px; 
            line-height: 1.3; 
            word-wrap: break-word; 
            margin-bottom: 2px;
        }
        
        /* 強制顏色生效 */
        .type-activity { background-color: #0d47a1 !important; color: #ffffff !important; border-left: 4px solid #002171 !important; } 
        .type-business { background-color: #bbdefb !important; color: #0d47a1 !important; border-left: 4px solid #1976d2 !important; } 
        .type-default { background-color: #eeeeee !important; color: #333 !important; border-left: 4px solid #999 !important; } 
    </style>
</head>
<body>

    <h2>金牛頓公司行事曆</h2>
    
    <div id="calendarContainer">
        <div id="calendarHeader">
            <button onclick="changeMonth(-1)" style="padding: 5px 15px;">◀ 上個月</button>
            <span id="currentYearMonth" style="font-weight:bold; font-size: 1.2em;"></span>
            <button onclick="changeMonth(1)" style="padding: 5px 15px;">下個月 ▶</button>
        </div>
        <table id="calendar">
            <thead>
                <tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk18e6JMlqZrTZkMdMybrvXSX-HuZ5vLTawqbU116-Xwd9DHUf25hAjOO7HxQ6mJ6E6K0ll8Eu-Iy8/pub?gid=0&single=true&output=csv';
        let leaveRecords = [];
        let currentDisplayDate = new Date();

        async function fetchData() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').slice(1);
                leaveRecords = rows.filter(row => row.trim() !== "").map(row => {
                    const cols = row.split(',');
                    return { name: cols[0]?.trim(), type: cols[1]?.trim(), start: cols[2]?.trim(), end: cols[3]?.trim(), note: cols[5]?.trim() };
                });
                renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1);
            } catch (e) { console.error("資料讀取失敗", e); }
        }

        function renderCalendar(year, month) {
            document.getElementById('currentYearMonth').textContent = `${year}年 ${month}月`;
            const tbody = document.querySelector('#calendar tbody');
            tbody.innerHTML = '';
            
            let firstDay = new Date(year, month - 1, 1).getDay();
            let lastDate = new Date(year, month, 0).getDate();
            let row = document.createElement('tr');
            
            for(let i=0; i<firstDay; i++) row.appendChild(document.createElement('td'));
            
            for(let d=1; d<=lastDate; d++) {
                if((firstDay + d - 1) % 7 === 0) { tbody.appendChild(row); row = document.createElement('tr'); }
                let cell = document.createElement('td');
                const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                cell.innerHTML = `<strong>${d}</strong>`;
                
                leaveRecords.filter(r => ds >= r.start && ds <= r.end).forEach(r => {
                    // 重新指定判斷顏色類別
                    let colorClass = 'type-default';
                    const typeStr = r.type || "";
                    if (typeStr.includes('金牛頓')) colorClass = 'type-activity';
                    else if (typeStr.includes('出差')) colorClass = 'type-business';
                    
                    const displayText = r.note ? `${r.name}<br>${r.note}` : r.name;
                    // 將類別寫入 div
                    cell.innerHTML += `<div class="leave-record ${colorClass}">${displayText}</div>`;
                });
                row.appendChild(cell);
            }
            tbody.appendChild(row);
        }

        function changeMonth(d) { 
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + d); 
            renderCalendar(currentDisplayDate.getFullYear(), currentDisplayDate.getMonth() + 1); 
        }

        fetchData();
    </script>
</body>
</html>
